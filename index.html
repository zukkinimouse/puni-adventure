  // 矩形 × 円の衝突判定
  function rectCircleCollide(rect, cx, cy, cr) {
    const nx = Math.max(rect.x, Math.min(cx, rect.x + rect.w));
    const ny = Math.max(rect.y, Math.min(cy, rect.y + rect.h));
    const dx = cx - nx, dy = cy - ny;
    return (dx * dx + dy * dy) < (cr * cr);
  }

  // 矩形同士の重なり（しっぽ当たり判定用）
  function rectRectsOverlap(a, b) {
    return !(
      a.x + a.w <= b.x ||
      b.x + b.w <= a.x ||
      a.y + a.h <= b.y ||
      b.y + b.h <= a.y
    );
  }

  // ルナモン：前方に振るしっぽの当たり矩形（ワールド座標）
  function getLunamonTailHitbox() {
    const tailW = 54;
    const tailH = 36;
    const gap = 6;
    const y = player.y - tailH * 0.5;
    if (player.facing === 1) {
      return { x: player.x + player.r + gap, y, w: tailW, h: tailH };
    }
    return { x: player.x - player.r - tailW - gap, y, w: tailW, h: tailH };
  }

  // ルナモン：しっぽ攻撃のリッチ描画（弧スイープ＋帯グラデ＋きらめき）
  function drawLunamonTailSwipeEffect(nowMs) {
    if (playerSkin !== 'lunamon' || gameWon || nowMs >= tailSwipeUntilMs) return;
    const duration = LUNAMON_TAIL_SWIPE_MS;
    const elapsed = tailSwipeUntilMs - nowMs;
    const u = Math.max(0, Math.min(1, 1 - elapsed / duration));

    const b = getLunamonTailHitbox();

    // 前方ヒット帯：グラデーションで奥から手前へ光が走るイメージ
    const gx0 = player.facing === 1 ? b.x : b.x + b.w;
    const gx1 = player.facing === 1 ? b.x + b.w : b.x;
    const lg = ctx.createLinearGradient(gx0, b.y + b.h * 0.5, gx1, b.y + b.h * 0.5);
    lg.addColorStop(0, 'rgba(109, 105, 168, 0)');
    lg.addColorStop(0.35, `rgba(139, 136, 198, ${0.22 * (1 - u * 0.5)})`);
    lg.addColorStop(0.55, `rgba(220, 210, 255, ${0.35 * (1 - u * 0.35)})`);
    lg.addColorStop(0.75, `rgba(255, 253, 208, ${0.28 * (1 - u * 0.45)})`);
    lg.addColorStop(1, 'rgba(255, 253, 208, 0)');
    ctx.fillStyle = lg;
    ctx.fillRect(b.x, b.y, b.w, b.h);

    // 弧のスイープ（プレイヤー基準・向きで左右反転）
    ctx.save();
    ctx.translate(player.x, player.y + 2);
    ctx.scale(player.facing, 1);

    const ax = player.r + 14;
    const ay = -4;
    const baseR = 46;

    // 残像風にレイヤーをずらして重ねる
    for (let layer = 0; layer < 4; layer++) {
      const delay = layer * 0.11;
      const lu = Math.max(0, Math.min(1, u - delay));
      const arcStart = -Math.PI * 0.62 + lu * Math.PI * 0.72;
      const arcEnd = arcStart + Math.PI * 0.34;
      ctx.beginPath();
      ctx.arc(ax, ay, baseR + layer * 2.8, arcStart, arcEnd);
      const alpha = (0.26 - layer * 0.055) * (1 - u * 0.42);
      ctx.strokeStyle = layer === 0
        ? `rgba(255, 253, 208, ${0.52 + 0.18 * (1 - u)})`
        : `rgba(139, 136, 198, ${alpha})`;
      ctx.lineWidth = 9 - layer * 2;
      ctx.lineCap = 'round';
      ctx.stroke();
    }

    // 弧上のきらめき
    const luSpark = u;
    const s0 = -Math.PI * 0.62 + luSpark * Math.PI * 0.72;
    const s1 = s0 + Math.PI * 0.34;
    ctx.fillStyle = `rgba(255, 255, 255, ${0.42 * (1 - u * 0.75)})`;
    for (let k = 0; k < 9; k++) {
      const ang = s0 + (k / 8) * (s1 - s0);
      const rr = baseR + (k % 3) * 2.2 + Math.sin(nowMs / 40 + k) * 1.2;
      const px = ax + Math.cos(ang) * rr;
      const py = ay + Math.sin(ang) * rr;
      ctx.beginPath();
      ctx.arc(px, py, 1.2 + (k % 2) * 0.5, 0, Math.PI * 2);
      ctx.fill();
    }

    // 外縁のパッとしたリムライト
    ctx.beginPath();
    const rimLu = Math.max(0, Math.min(1, u - 0.05));
    const r0 = -Math.PI * 0.62 + rimLu * Math.PI * 0.72;
    const r1 = r0 + Math.PI * 0.34;
    ctx.arc(ax, ay, baseR + 1, r0, r1);
    ctx.strokeStyle = `rgba(255, 253, 208, ${0.35 * (1 - u)})`;
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.restore();
  }

  // ルナモンしっぽ：短時間ヒットボックスで敵を撃破
  function applyLunamonTailHits(nowMs) {
    // 「終了時刻ちょうど」のフレームも判定する（>= だとその1フレームが抜けてボス被弾SEが鳴らないことがある）
    if (playerSkin !== 'lunamon' || gameWon || nowMs > tailSwipeUntilMs) return;
    const box = getLunamonTailHitbox();
    for (const e of enemies) {
      if (e.defeated) continue;
      if (rectRectsOverlap(box, e)) {
        e.defeated = true;
        e.vanishUntilMs = nowMs + 520;
        e.vanishLastSeMs = nowMs;
        playSe('enemyDefeat');
      }
    }
    for (const he of hammerEnemies) {
      if (he.defeated) continue;
      if (rectRectsOverlap(box, he)) {
        he.defeated = true;
        he.vanishUntilMs = nowMs + 520;
        he.vanishLastSeMs = nowMs;
        playSe('enemyDefeat');
      }
    }
    for (const se of skyDropEnemies) {
      if (se.defeated) continue;
      if (rectRectsOverlap(box, se)) {
        se.defeated = true;
        se.vanishUntilMs = nowMs + 520;
        se.vanishLastSeMs = nowMs;
        playSe('enemyDefeat');
      }
    }
    if (
      isBossStage() &&
      bossDefeatPhase === 0 &&
      bossHp > 0 &&
      bossTailDamagePending
    ) {
      if (bossDamageHitRect(box)) {
        if (nowMs >= bossInvincibleUntilMs) {
          damageBossIfAlive();
        }
        bossTailDamagePending = false;
      }
    }
  }

  function drawTiledBackground(image, speed) {
    // 背景は1枚絵をそのまま使い、横方向のみループさせる
    const drawWidth = W + 2;
    const tileStart = ((-camX * speed) % drawWidth + drawWidth) % drawWidth - drawWidth;
    for (let i = 0; i < 4; i++) {
      const dx = tileStart + i * drawWidth;
      ctx.drawImage(image, dx, 0, drawWidth, H);
    }
  }

  function initSandParticles() {
    sandParticles = [];
    for (let i = 0; i < 34; i++) {
      sandParticles.push({
        x: Math.random() * W,
        y: 210 + Math.random() * (H - 210),
        size: 0.8 + Math.random() * 2.0,
        vx: 0.25 + Math.random() * 0.55,
        sway: Math.random() * Math.PI * 2
      });
    }
  }

  function updateSandParticles(dt = 1) {
    if (sandParticles.length === 0) initSandParticles();
    const t = performance.now() / 1000;
    for (const sp of sandParticles) {
      sp.x -= sp.vx * dt;
      sp.y += Math.sin(t * 2.4 + sp.sway) * 0.12 * dt;
      if (sp.x < -6) {
        sp.x = W + 6;
        sp.y = 210 + Math.random() * (H - 210);
      }
    }
  }

  function drawSandParticles() {
    ctx.fillStyle = 'rgba(255, 220, 145, 0.35)';
    for (const sp of sandParticles) {
      ctx.beginPath();
      ctx.arc(sp.x, sp.y, sp.size, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  /** 撃破後の点滅中、消滅 SE を間欠再生 */
  function tickEnemyVanishSeSounds(list, nowMs) {
    for (const ent of list) {
      if (!ent.defeated || !ent.vanishUntilMs || nowMs >= ent.vanishUntilMs) continue;
      if (nowMs - ent.vanishLastSeMs >= 88) {
        ent.vanishLastSeMs = nowMs;
        playSe('enemyVanishTick');
      }
    }
  }

  // ============================================
  // ゲームループ: 更新
  // ============================================
  function update(dt = 1) {
    if (!gameStarted) return;
    if (gameOverMenuActive) return;
    // クリア演出タイマーはポーズ中も進める（旗の揺れなど）
    if (gameWon) {
      clearTimer += dt;
      syncAttackButtonVisual();
      return;
    }
    if (gamePaused) return;

    const nowMs = performance.now();
    tickEnemyVanishSeSounds(enemies, nowMs);
    tickEnemyVanishSeSounds(hammerEnemies, nowMs);
    tickEnemyVanishSeSounds(skyDropEnemies, nowMs);

    // ステージ3ギミック更新（流砂/崩れ）
    for (const p of platforms) {
      if (p.disabled) continue;
      if (p.kind === 'crumbling' && p.crumbleTriggeredAt > 0) {
        if (nowMs - p.crumbleTriggeredAt >= (p.crumbleDelayMs || 900)) {
          p.disabled = true;
          continue;
        }
      }
      if (p.kind === 'sinking' && p.sinkActivated) {
        const limit = p.baseY + (p.maxSink || 60);
        p.y = Math.min(limit, p.y + (p.sinkSpeed || 0.2) * dt);
      }
    }

    // 敵の左右往復
    for (const e of enemies) {
      if (e.defeated) continue;
      e.x += e.speed * e.dir * dt;
      if (e.x <= e.minX) {
        e.x = e.minX;
        e.dir = 1;
      } else if (e.x >= e.maxX) {
        e.x = e.maxX;
        e.dir = -1;
      }
    }

    // ハンマー敵（ジャンプ＋投擲）
    for (const he of hammerEnemies) {
      if (he.defeated) continue;
      he.vx = he.speed * he.dir;
      he.x += he.vx * dt;
      if (he.x <= he.minX) {
        he.x = he.minX;
        he.dir = 1;
      } else if (he.x >= he.maxX) {
        he.x = he.maxX;
        he.dir = -1;
      }

      he.justLanded = false;
      if (he.jumpCooldown > 0) he.jumpCooldown -= dt;
      if (he.throwCooldown > 0) he.throwCooldown -= dt;

      if (he.onGround && he.jumpCooldown <= 0) {
        he.vy = -8.8;
        he.onGround = false;
        he.jumpCooldown = 75;
      }

      he.vy += GRAVITY * dt;
      if (he.vy > MAX_FALL) he.vy = MAX_FALL;
      he.y += he.vy * dt;
      if (he.y >= 400) {
        if (!he.onGround && he.vy > 0) he.justLanded = true;
        he.y = 400;
        he.vy = 0;
        he.onGround = true;
      }

      // 着地時にハンマーを放物線で投げる
      if (he.justLanded && he.throwCooldown <= 0) {
        hammers.push({
          x: he.x + he.w * 0.5,
          y: he.y + 8,
          vx: he.dir * 4.6,
          vy: -7.6,
          r: 8
        });
        he.throwCooldown = 55;
      }
    }

    // ハンマー弾の更新（放物線）
    for (let i = hammers.length - 1; i >= 0; i--) {
      const hm = hammers[i];
      hm.vy += GRAVITY * 0.85 * dt;
      hm.x += hm.vx * dt;
      hm.y += hm.vy * dt;
      if (hm.y > H + 80 || hm.x < -100 || hm.x > worldWidth + 100) {
        hammers.splice(i, 1);
      }
    }

    // 新敵：空から落とす敵（左右移動＋投下）
    for (const se of skyDropEnemies) {
      if (se.defeated) continue;
      se.x += se.speed * se.dir * dt;
      if (se.x <= se.minX) {
        se.x = se.minX;
        se.dir = 1;
      } else if (se.x >= se.maxX) {
        se.x = se.maxX;
        se.dir = -1;
      }
      se.dropCooldown -= dt;
      if (se.dropCooldown <= 0) {
        const sway = Math.sin((performance.now() / 220) + (se.seed || 0)) * 0.6;
        skyDrops.push({
          x: se.x + se.w * 0.5,
          y: se.y + se.h,
          vx: sway,
          vy: 0,
          r: 10
        });
        se.dropCooldown = 55 + Math.floor(Math.abs(Math.sin((performance.now() / 350) + (se.seed || 0))) * 45);
      }
    }

    // 落下物更新
    for (let i = skyDrops.length - 1; i >= 0; i--) {
      const d = skyDrops[i];
      d.vy += GRAVITY * 1.05 * dt;
      d.x += d.vx * dt;
      d.y += d.vy * dt;
      if (d.y > H + 120 || d.x < -200 || d.x > worldWidth + 200) {
        skyDrops.splice(i, 1);
      }
    }

    // 攻撃：プニは星弾、ルナモンはしっぽ（星は消費しない）
    if (input.attackPressed) {
      if (playerSkin === 'lunamon') {
        if (!gameWon && nowMs >= tailAttackCooldownUntilMs) {
          playVoice('attack');
          tailSwipeUntilMs = nowMs + LUNAMON_TAIL_SWIPE_MS;
          tailAttackCooldownUntilMs = nowMs + LUNAMON_TAIL_COOLDOWN_MS;
          if (isBossStage()) bossTailDamagePending = true;
          if (!isBossStage()) playSe('tailSwipe');
          updateHud();
        }
      } else if (starAmmo > 0) {
        playVoice('attack');
        starShots.push({
          x: player.x + player.facing * (player.r + 6),
          y: player.y - 2,
          vx: player.facing * 7.4,
          vy: -1.6,
          r: 11,
          bornAt: nowMs
        });
        starAmmo--;
        updateHud();
      }
    }
    input.attackPressed = false;

    // 星弾更新
    for (let i = starShots.length - 1; i >= 0; i--) {
      const shot = starShots[i];
      shot.vy += GRAVITY * 0.4 * dt;
      shot.x += shot.vx * dt;
      shot.y += shot.vy * dt;
      if (shot.y > H + 80 || shot.x < -120 || shot.x > worldWidth + 120) {
        starShots.splice(i, 1);
      }
    }

    // 星弾と敵の衝突
    for (let i = starShots.length - 1; i >= 0; i--) {
      const shot = starShots[i];
      let hit = false;
      for (const e of enemies) {
        if (e.defeated) continue;
        const dx = shot.x - (e.x + e.w * 0.5);
        const dy = shot.y - (e.y + e.h * 0.5);
        if (dx * dx + dy * dy < (shot.r + 16) * (shot.r + 16)) {
          e.defeated = true;
          e.vanishUntilMs = nowMs + 520;
          e.vanishLastSeMs = nowMs;
          playSe('enemyDefeat');
          hit = true;
          break;
        }
      }
      if (!hit) {
        for (const he of hammerEnemies) {
          if (he.defeated) continue;
          const dx = shot.x - (he.x + he.w * 0.5);
          const dy = shot.y - (he.y + he.h * 0.5);
          if (dx * dx + dy * dy < (shot.r + 17) * (shot.r + 17)) {
            he.defeated = true;
            he.vanishUntilMs = nowMs + 520;
            he.vanishLastSeMs = nowMs;
            playSe('enemyDefeat');
            hit = true;
            break;
          }
        }
      }
      if (!hit) {
        for (const se of skyDropEnemies) {
          if (se.defeated) continue;
          const dx = shot.x - (se.x + se.w * 0.5);
          const dy = shot.y - (se.y + se.h * 0.5);
          if (dx * dx + dy * dy < (shot.r + 17) * (shot.r + 17)) {
            se.defeated = true;
            se.vanishUntilMs = nowMs + 520;
            se.vanishLastSeMs = nowMs;
            playSe('enemyDefeat');
            hit = true;
            break;
          }
        }
      }
      if (
        !hit &&
        isBossStage() &&
        bossDefeatPhase === 0 &&
        bossHp > 0
      ) {
        if (bossDamageHitCircle(shot.x, shot.y, shot.r)) {
          // 無敵中はダメージなしで星弾のみ消す（弾かれた音）
          if (nowMs < bossInvincibleUntilMs) {
            playSe('bossStarClang');
            hit = true;
          } else {
            damageBossIfAlive();
            hit = true;
          }
        }
      }
      if (hit) starShots.splice(i, 1);
    }

    // 左右移動
    if (input.left)  { player.vx = -MOVE_SPEED; player.facing = -1; }
    else if (input.right) { player.vx = MOVE_SPEED; player.facing = 1; }
    else { player.vx *= Math.pow(FRICTION, dt); }

    // オアシス（水）内は少し減速
    if (oasis) {
      const inOasis =
        player.x > oasis.x &&
        player.x < oasis.x + oasis.w &&
        player.y > oasis.y &&
        player.y < oasis.y + oasis.h;
      if (inOasis) player.vx *= Math.pow(0.88, dt);
    }

    // ジャンプ発射（連続5回まで）
    if (input.jumpPressed && jumpCount < MAX_CONSECUTIVE_JUMPS) {
      player.vy = JUMP_POWER;
      player.onGround = false;
      jumpCount++;
      player.squish = -0.3;  // ジャンプ時に縦伸び
      playSe('jump');
    }
    input.jumpPressed = false;

    // 重力（ジャンプ長押し中は弱重力でふわっと）
    if (input.jump && player.vy > 0) {
      player.vy += FLOAT_GRAVITY * dt;
      player.floating = true;
    } else {
      player.vy += GRAVITY * dt;
      player.floating = false;
    }

    // 砂漠の熱風ゾーン（上段滞在を難しくする）
    for (const wz of windZones) {
      if (
        player.x > wz.x &&
        player.x < wz.x + wz.w &&
        player.y > wz.y &&
        player.y < wz.y + wz.h
      ) {
        player.vy += wz.forceY * dt;
      }
    }
    if (player.vy > MAX_FALL) player.vy = MAX_FALL;

    // X方向移動＆衝突解決
    player.x += player.vx * dt;

    // ワールド端の透明な壁（通過不可）
    if (player.x - player.r < 0) {
      player.x = player.r;
      if (player.vx < 0) player.vx = 0;
    }
    if (player.x + player.r > worldWidth) {
      player.x = worldWidth - player.r;
      if (player.vx > 0) player.vx = 0;
    }
    // ボス幹の左側へは回り込めない（プレイヤーのみ）
    if (isBossStage()) {
      const layBlock = getBossArenaLayout().blockLeft;
      if (player.x + player.r > layBlock - 1) {
        player.x = layBlock - player.r - 1;
        if (player.vx > 0) player.vx = 0;
      }
      // 幹前に張り付いている間は 4 秒ごとに強風で左端付近へ押し戻す（ダメージなし・SEあり）
      const hugging =
        bossHp > 0 &&
        bossDefeatPhase === 0 &&
        !gameWon &&
        player.x + player.r >= layBlock - 12;
      if (hugging) {
        if (bossInnerGustAtMs <= 0) {
          bossInnerGustAtMs = nowMs + 4000;
        } else if (nowMs >= bossInnerGustAtMs) {
          const leftTargetX = 58 + player.r;
          player.x = leftTargetX;
          player.vx = -6.5;
          bossInnerGustAtMs = nowMs + 4000;
          triggerBossScreenShake(6.2, 320);
          playSe('bossGustWind');
        }
      } else {
        bossInnerGustAtMs = 0;
      }
    }

    for (const p of [...platforms, ...ceilingGates]) {
      if (p.disabled) continue;
      if (rectCircleCollide(p, player.x, player.y, player.r)) {
        if (player.vx > 0)      player.x = p.x - player.r;
        else if (player.vx < 0) player.x = p.x + p.w + player.r;
        player.vx = 0;
      }
    }

    // Y方向移動＆衝突解決
    player.y += player.vy * dt;
    const wasInAir = !player.onGround;
    player.onGround = false;
    for (const p of [...platforms, ...ceilingGates]) {
      if (p.disabled) continue;
      if (rectCircleCollide(p, player.x, player.y, player.r)) {
        if (player.vy > 0) {
          player.y = p.y - player.r;
          if (wasInAir && player.vy > 5) player.squish = 0.4;  // 着地時に潰れ
          player.vy = 0;
          player.onGround = true;
          jumpCount = 0;
          if (p.kind === 'sinking') p.sinkActivated = true;
          if (p.kind === 'crumbling' && p.crumbleTriggeredAt <= 0) {
            p.crumbleTriggeredAt = nowMs;
          }
        } else if (player.vy < 0) {
          player.y = p.y + p.h + player.r;
          player.vy = 0;
        }
      }
    }

    // スクイッシュ減衰
    player.squish *= 0.85;

    // ルナモン：しっぽ攻撃の当たり判定（移動・衝突解決後の位置で判定）
    applyLunamonTailHits(nowMs);
    if (isBossStage() && playerSkin === 'lunamon' && nowMs >= tailSwipeUntilMs) {
      bossTailDamagePending = false;
    }

    // ステージ4：ボス弾・出現物・撃破タイマー
    updateBossBattle(dt, nowMs);

    // 画面外に落ちたらリセット
    if (player.y > H + 100) {
      onFallDamage();
      return;
    }

    // 敵に触れたらリセット
    if (!isInvincible()) {
      for (const e of enemies) {
        if (e.defeated) continue;
        if (rectCircleCollide(e, player.x, player.y, player.r)) {
          playSe('enemy');
          onPlayerDamage(true);
          return;
        }
      }
      for (const he of hammerEnemies) {
        if (he.defeated) continue;
        if (rectCircleCollide(he, player.x, player.y, player.r)) {
          playSe('enemy');
          onPlayerDamage(true);
          return;
        }
      }
      for (const hm of hammers) {
        const dx = player.x - hm.x;
        const dy = player.y - hm.y;
        if (dx * dx + dy * dy < (player.r + hm.r) * (player.r + hm.r)) {
          playSe('enemy');
          onPlayerDamage(true);
          return;
        }
      }
      for (const d of skyDrops) {
        const dx = player.x - d.x;
        const dy = player.y - d.y;
        if (dx * dx + dy * dy < (player.r + d.r) * (player.r + d.r)) {
          playSe('enemy');
          onPlayerDamage(true);
          return;
        }
      }
      for (const hz of hazards) {
        if (hz.kind !== 'cactus') continue;
        if (rectCircleCollide(hz, player.x, player.y, player.r)) {
          playSe('enemy');
          onPlayerDamage(true);
          return;
        }
      }
    }

    // 星回収
    for (const s of stars) {
      if (!s.collected) {
        const dx = player.x - s.x, dy = player.y - s.y;
        if (dx * dx + dy * dy < 900) {  // 半径30以内
          s.collected = true;
          collected++;
          starAmmo++;
          playSe('star');
          updateHud();
        }
      }
    }

    // 残機アップアイテム（ステージ序盤に1つ）
    if (lifeItem && !lifeItem.collected) {
      const dx = player.x - lifeItem.x;
      const dy = player.y - lifeItem.y;
      if (dx * dx + dy * dy < 30 * 30) {
        lifeItem.collected = true;
        lives++;
        playSe('life');
        updateHud();
      }
    }

    // ゴール判定（ボス戦ステージでは無効）
    if (
      !isBossStage() &&
      collected === stars.length &&
      player.x + player.r > goal.x &&
      player.x - player.r < goal.x + goal.w &&
      player.y + player.r > goal.y &&
      player.y - player.r < goal.y + goal.h
    ) {
      gameWon = true;
      goalFlagTaken = true;
      clearTimer = 0;
      playSe('fanfare');
      showMessage('ゲームクリア！\nおつかれさま');
      clearActionsEl.style.display = 'block';
    }

    // カメラ追従（ボスアリーナは固定）
    if (!isBossStage()) {
      const targetCamX = player.x - W / 2;
      camX += (targetCamX - camX) * (1 - Math.pow(0.9, dt));
      camX = Math.max(0, Math.min(camX, worldWidth - W));
    } else {
      camX = 0;
    }

    // 砂漠専用の環境演出
    if (stageTheme === 'desert') {
      updateSandParticles(dt);
      if (
        player.onGround &&
        Math.abs(player.vx) > 0.55 &&
        nowMs >= sandStepCooldownUntilMs
      ) {
        playSe('sandStep');
        sandStepCooldownUntilMs = nowMs + 320;
      }
    }

    // アタックボタン（しっぽの残り秒など）を毎フレーム同期
    if (gameStarted && !gameOverMenuActive && !gameWon) {
      syncAttackButtonVisual();
    }

    // まばたき
    player.eyeBlink = (player.eyeBlink + dt) % 180;
  }

  // ============================================
  // ゲームループ: 描画
  // ============================================
  function drawPuniSkin(clearPose, blink, motion) {
    // 本体（丸く柔らかい）
    ctx.fillStyle = '#FFB6D5';
    ctx.beginPath();
    ctx.arc(0, 0, player.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#D67BA0';
    ctx.lineWidth = 2;
    ctx.stroke();

    // ほっぺ（移動時は少し跳ねる）
    const cheekOffsetY = motion.walkBounce * 0.28;
    ctx.fillStyle = '#FF8FB5';
    ctx.beginPath();
    ctx.arc(-8 * player.facing, 4 + cheekOffsetY, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(8 * player.facing, 4 + cheekOffsetY, 4, 0, Math.PI * 2);
    ctx.fill();

    // 目
    ctx.fillStyle = '#222';
    const eyeY = -4 + motion.airLift * 0.2;
    if (blink) {
      ctx.fillRect(-6 * player.facing - 2, eyeY, 4, 1);
      ctx.fillRect(6 * player.facing - 2, eyeY, 4, 1);
    } else {
      ctx.beginPath();
      ctx.ellipse(-6 * player.facing, eyeY, 2 + motion.speed01 * 0.2, 4, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(6 * player.facing, eyeY, 2 + motion.speed01 * 0.2, 4, 0, 0, Math.PI * 2);
      ctx.fill();
      // 目のハイライト
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(-6 * player.facing, eyeY - 1, 0.8, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(6 * player.facing, eyeY - 1, 0.8, 0, Math.PI * 2);
      ctx.fill();
    }

    // 足（クリア時は決めポーズ）
    ctx.fillStyle = '#D67BA0';
    if (clearPose) {
      const t = Math.sin(clearTimer / 6) * 1.5;
      ctx.beginPath();
      ctx.ellipse(-13, 12 + t, 6, 4, -0.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(12, 17 - t, 6, 4, 0.35, 0, Math.PI * 2);
      ctx.fill();

      // クリア時は手を上げた決めポーズを追加
      ctx.strokeStyle = '#D67BA0';
      ctx.lineWidth = 4;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(-4, 3);
      ctx.lineTo(-15, -10);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(4, 3);
      ctx.lineTo(15, -10);
      ctx.stroke();
    } else {
      const footTilt = motion.footSwing * 0.25;
      const footYOffset = motion.walkBounce * 0.4;
      ctx.beginPath();
      ctx.ellipse(-10, 16 + footYOffset, 6, 4, -footTilt, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(10, 16 - footYOffset, 6, 4, footTilt, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawLunamonSkin(clearPose, blink, motion) {
    // しっぽ（背面）: 巻いた大きめシルエット
    ctx.fillStyle = '#8B88C6';
    ctx.beginPath();
    ctx.ellipse(
      (-15 + motion.tailSwing * 2.4) * player.facing,
      3 + motion.walkBounce * 0.25,
      20,
      16,
      (0.25 + motion.tailSwing * 0.08) * player.facing,
      0,
      Math.PI * 2
    );
    ctx.fill();
    ctx.strokeStyle = '#6D69A8';
    ctx.lineWidth = 2;
    ctx.stroke();

    // しっぽ先端（三日月・クリーム）
    ctx.fillStyle = '#FFFDD0';
    ctx.beginPath();
    ctx.arc((-27 + motion.tailSwing * 3.5) * player.facing, -2 + motion.walkBounce * 0.2, 7, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalCompositeOperation = 'destination-out';
    ctx.beginPath();
    ctx.arc((-24 * player.facing) + (3 * player.facing), -2, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalCompositeOperation = 'source-over';

    // 耳（大きめ。移動時に軽く弾む）
    const earBounce = motion.walkBounce * 0.3;
    ctx.fillStyle = '#8B88C6';
    ctx.beginPath();
    ctx.ellipse(-11, -16 - earBounce, 7, 10, -0.45, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(11, -16 + earBounce, 7, 10, 0.45, 0, Math.PI * 2);
    ctx.fill();

    // 耳の内側（夜空ネイビー）
    ctx.fillStyle = '#191970';
    ctx.beginPath();
    ctx.ellipse(-11, -16 - earBounce, 3.4, 5.2, -0.45, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(11, -16 + earBounce, 3.4, 5.2, 0.45, 0, Math.PI * 2);
    ctx.fill();

    // 胴体（ふわっとした丸い体）
    ctx.fillStyle = '#8B88C6';
    ctx.beginPath();
    ctx.ellipse(0, 0, player.r + 2, player.r + 1, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#6D69A8';
    ctx.lineWidth = 2;
    ctx.stroke();

    // お腹（クリーム）
    ctx.fillStyle = '#FFFDD0';
    ctx.beginPath();
    ctx.ellipse(0, 6, 11, 9, 0, 0, Math.PI * 2);
    ctx.fill();

    // 首元の星ペンダント
    ctx.fillStyle = '#FFD700';
    ctx.strokeStyle = '#D8A800';
    ctx.lineWidth = 1.3;
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const a = (i * 2 * Math.PI) / 5 - Math.PI / 2;
      ctx.lineTo(Math.cos(a) * 3.5, 12 + Math.sin(a) * 3.5);
      const a2 = ((i * 2 + 1) * Math.PI) / 5 - Math.PI / 2;
      ctx.lineTo(Math.cos(a2) * 1.5, 12 + Math.sin(a2) * 1.5);
    }
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // 目（まばたき対応）
    const eyeLeftX = -6 * player.facing;
    const eyeRightX = 6 * player.facing;
    const eyeY = -4 + motion.airLift * 0.25;
    if (blink) {
      ctx.strokeStyle = '#1F1C33';
      ctx.lineWidth = 2;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(eyeLeftX - 2, eyeY);
      ctx.lineTo(eyeLeftX + 2, eyeY);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(eyeRightX - 2, eyeY);
      ctx.lineTo(eyeRightX + 2, eyeY);
      ctx.stroke();
    } else {
      ctx.fillStyle = '#1F1C33';
      ctx.beginPath();
      ctx.ellipse(eyeLeftX, eyeY, 2.9 + motion.speed01 * 0.15, 4.9, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(eyeRightX, eyeY, 2.9 + motion.speed01 * 0.15, 4.9, 0, 0, Math.PI * 2);
      ctx.fill();

      // ハイライトは多めに入れてキラッと見せる
      ctx.fillStyle = '#FFFFFF';
      ctx.beginPath();
      ctx.arc(eyeLeftX - 0.6, eyeY - 1.6, 1.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(eyeRightX - 0.6, eyeY - 1.6, 1.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(eyeLeftX + 1.1, eyeY + 0.8, 0.65, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(eyeRightX + 1.1, eyeY + 0.8, 0.65, 0, Math.PI * 2);
      ctx.fill();
    }

    // 小悪魔っぽいニヤリ口元
    ctx.strokeStyle = '#4D2D58';
    ctx.lineWidth = 1.8;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(-3, 4 + motion.walkBounce * 0.22);
    ctx.quadraticCurveTo(2 * player.facing, 9 + motion.walkBounce * 0.12, 6, 4 + motion.walkBounce * 0.22);
    ctx.stroke();

    // 足（クリア時は決めポーズ）
    ctx.fillStyle = '#6D69A8';
    if (clearPose) {
      const t = Math.sin(clearTimer / 6) * 1.5;
      ctx.beginPath();
      ctx.ellipse(-13, 12 + t, 6, 4, -0.35, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(12, 17 - t, 6, 4, 0.35, 0, Math.PI * 2);
      ctx.fill();

      // クリア時は前脚を上げてガッツポーズ
      ctx.strokeStyle = '#6D69A8';
      ctx.lineWidth = 4;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(-5, 3);
      ctx.lineTo(-16, -11);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(5, 3);
      ctx.lineTo(16, -11);
      ctx.stroke();
    } else {
      const pawSwing = motion.footSwing * 0.2;
      const pawYOffset = motion.walkBounce * 0.5;
      ctx.beginPath();
      ctx.ellipse(-10, 16 + pawYOffset, 6, 4, -0.08 - pawSwing, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(10, 16 - pawYOffset, 6, 4, 0.08 + pawSwing, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawPlayer(x, y) {
    // 無敵中は点滅表示（一定間隔で非表示フレームを作る）
    if (isInvincible()) {
      const blinkOn = Math.floor(performance.now() / 80) % 2 === 0;
      if (!blinkOn) return;
    }

    // スクイッシュ効果（縦に潰れたり伸びたり）
    const scaleY = 1 + player.squish;
    const scaleX = 1 - player.squish * 0.5;
    const clearPose = gameWon;
    const blink = player.eyeBlink < 8;
    const speed01 = Math.min(1, Math.abs(player.vx) / MOVE_SPEED);
    const movePhase = performance.now() * 0.018;
    const walkBounce = (player.onGround && !clearPose) ? Math.sin(movePhase) * speed01 * 2.2 : 0;
    const footSwing = (player.onGround && !clearPose) ? Math.sin(movePhase + Math.PI / 2) * speed01 : 0;
    const tailSwing = Math.sin(movePhase * 0.72 + player.facing * 0.8) * (0.35 + speed01 * 0.65);
    const airLift = !player.onGround ? Math.max(-2.8, Math.min(2.8, -player.vy * 0.28)) : 0;
    const lean = Math.max(-0.18, Math.min(0.18, (player.vx / MOVE_SPEED) * 0.08 + footSwing * 0.05));
    const motion = {
      speed01,
      walkBounce,
      footSwing,
      tailSwing,
      airLift
    };

    ctx.save();
    // 移動時は体を少し前傾させ、上下バウンスを加えて情報量を上げる
    ctx.translate(x, y + walkBounce + airLift * 0.2);
    ctx.rotate(lean * player.facing);
    ctx.scale(scaleX, scaleY);

    if (playerSkin === 'puni') {
      drawPuniSkin(clearPose, blink, motion);
    } else {
      drawLunamonSkin(clearPose, blink, motion);
    }

    ctx.restore();
  }

  function drawStar(x, y) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate((Date.now() / 500) % (Math.PI * 2));
    ctx.fillStyle = '#FFD93D';
    ctx.strokeStyle = '#E8A500';
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const a  = (i * 2 * Math.PI) / 5 - Math.PI / 2;
      ctx.lineTo(Math.cos(a) * 10, Math.sin(a) * 10);
      const a2 = ((i * 2 + 1) * Math.PI) / 5 - Math.PI / 2;
      ctx.lineTo(Math.cos(a2) * 4, Math.sin(a2) * 4);
    }
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    ctx.restore();
  }

  // プニの星弾専用：大きめ＋尾・グロー・グラデ（マップの星とは別描画）
  function drawStarShot(shot) {
    const nowMs = performance.now();
    const age = typeof shot.bornAt === 'number' ? nowMs - shot.bornAt : 999;
    const spawnPulse = age < 150 ? 1 + (1 - age / 150) * 0.2 : 1;
    const base = shot.r / 11;
    const R1 = 15 * base * spawnPulse;
    const R2 = 6 * base * spawnPulse;
    const rot = (Date.now() / 380) % (Math.PI * 2);

    const spd = Math.hypot(shot.vx, shot.vy);
    const nx = spd > 0.08 ? -shot.vx / spd : -1;
    const ny = spd > 0.08 ? -shot.vy / spd : 0;

    ctx.save();
    ctx.translate(shot.x, shot.y);

    // 軌跡尾（移動の逆向きに粒を並べる）
    for (let t = 0; t < 6; t++) {
      const ax = nx * (5 + t * 6.5);
      const ay = ny * (5 + t * 6.5);
      const alpha = (0.16 - t * 0.022) * (0.55 + Math.min(1, spd / 11));
      ctx.fillStyle = `rgba(255, 225, 140, ${Math.max(0, alpha)})`;
      ctx.beginPath();
      ctx.arc(ax, ay, 3.6 - t * 0.35, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.rotate(rot);

    // 外周グロー（やや大きい星形シルエット）
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const a = (i * 2 * Math.PI) / 5 - Math.PI / 2;
      ctx.lineTo(Math.cos(a) * (R1 + 5), Math.sin(a) * (R1 + 5));
      const a2 = ((i * 2 + 1) * Math.PI) / 5 - Math.PI / 2;
      ctx.lineTo(Math.cos(a2) * (R2 + 2.5), Math.sin(a2) * (R2 + 2.5));
    }
    ctx.closePath();
    const glowGrad = ctx.createRadialGradient(0, 0, 1, 0, 0, R1 + 10);
    glowGrad.addColorStop(0, 'rgba(255, 255, 235, 0.5)');
    glowGrad.addColorStop(0.4, 'rgba(255, 210, 100, 0.28)');
    glowGrad.addColorStop(1, 'rgba(255, 160, 40, 0)');
    ctx.fillStyle = glowGrad;
    ctx.fill();

    // 本体（放射グラデ＋縁）
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const a = (i * 2 * Math.PI) / 5 - Math.PI / 2;
      ctx.lineTo(Math.cos(a) * R1, Math.sin(a) * R1);
      const a2 = ((i * 2 + 1) * Math.PI) / 5 - Math.PI / 2;
      ctx.lineTo(Math.cos(a2) * R2, Math.sin(a2) * R2);
    }
    ctx.closePath();
    const bodyGrad = ctx.createRadialGradient(-R1 * 0.18, -R1 * 0.22, 0.5, 0, 0, R1 * 1.15);
    bodyGrad.addColorStop(0, '#FFFCED');
    bodyGrad.addColorStop(0.32, '#FFEC8B');
    bodyGrad.addColorStop(0.65, '#FFD93D');
    bodyGrad.addColorStop(1, '#D9A008');
    ctx.fillStyle = bodyGrad;
    ctx.fill();
    ctx.strokeStyle = 'rgba(160, 100, 0, 0.9)';
    ctx.lineWidth = 2.4;
    ctx.stroke();

    // 頂点付近のきらめき
    for (let k = 0; k < 7; k++) {
      const a = -Math.PI / 2 + (k / 6) * Math.PI * 0.95;
      const rr = R1 * 0.9;
      const px = Math.cos(a) * rr;
      const py = Math.sin(a) * rr;
      const tw = 0.35 + 0.25 * Math.sin(nowMs / 45 + k * 1.7);
      ctx.fillStyle = `rgba(255, 255, 255, ${tw})`;
      ctx.beginPath();
      ctx.arc(px, py, 1.2 + (k % 2) * 0.45, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();
  }

  function drawLifeItem(x, y) {
    ctx.save();
    ctx.translate(x, y);
    ctx.fillStyle = '#FF4D6D';
    ctx.beginPath();
    ctx.moveTo(0, 12);
    ctx.bezierCurveTo(-14, -2, -12, -14, -2, -10);
    ctx.bezierCurveTo(2, -7, 4, -4, 0, -1);
    ctx.bezierCurveTo(-4, -4, -2, -7, 2, -10);
    ctx.bezierCurveTo(12, -14, 14, -2, 0, 12);
    ctx.fill();
    ctx.restore();
  }

  function drawEnemy(e) {
    const nowMs = performance.now();
    if (e.defeated) {
      if (!e.vanishUntilMs || nowMs >= e.vanishUntilMs) return;
      ctx.save();
      ctx.globalAlpha = 0.14 + 0.86 * Math.abs(Math.sin(nowMs / 40));
    }
    const cx = e.x + e.w / 2;
    const top = e.y;
    const base = e.y + e.h;
    const spikes = 6;
    const spikeW = e.w / spikes;

    ctx.beginPath();
    ctx.moveTo(e.x, base);
    for (let i = 0; i < spikes; i++) {
      const sx = e.x + i * spikeW;
      ctx.lineTo(sx + spikeW * 0.5, top);
      ctx.lineTo(sx + spikeW, base);
    }
    ctx.closePath();
    ctx.fillStyle = '#A14BE0';
    ctx.fill();
    ctx.strokeStyle = '#7F2BC4';
    ctx.lineWidth = 2;
    ctx.stroke();

    // 目
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(cx - 7, base - 8, 3, 0, Math.PI * 2);
    ctx.arc(cx + 7, base - 8, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#2A1042';
    ctx.beginPath();
    ctx.arc(cx - 7, base - 8, 1.6, 0, Math.PI * 2);
    ctx.arc(cx + 7, base - 8, 1.6, 0, Math.PI * 2);
    ctx.fill();
    if (e.defeated) ctx.restore();
  }

  function drawHammerEnemy(he) {
    const nowMs = performance.now();
    if (he.defeated) {
      if (!he.vanishUntilMs || nowMs >= he.vanishUntilMs) return;
      ctx.save();
      ctx.globalAlpha = 0.14 + 0.86 * Math.abs(Math.sin(nowMs / 40));
    }
    const cx = he.x + he.w / 2;
    const cy = he.y + he.h / 2;
    ctx.fillStyle = '#6B4B2A';
    ctx.beginPath();
    ctx.roundRect(he.x, he.y, he.w, he.h, 10);
    ctx.fill();
    ctx.strokeStyle = '#4A331B';
    ctx.lineWidth = 2;
    ctx.stroke();

    // 目
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(cx - 6, cy - 3, 3, 0, Math.PI * 2);
    ctx.arc(cx + 6, cy - 3, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#1d1d1d';
    ctx.beginPath();
    ctx.arc(cx - 6, cy - 3, 1.5, 0, Math.PI * 2);
    ctx.arc(cx + 6, cy - 3, 1.5, 0, Math.PI * 2);
    ctx.fill();

    // 手持ちハンマー
    const handX = cx + he.dir * 14;
    const handY = cy + 3;
    ctx.strokeStyle = '#8A8F99';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(handX, handY);
    ctx.lineTo(handX + he.dir * 10, handY - 8);
    ctx.stroke();
    ctx.fillStyle = '#555A66';
    ctx.beginPath();
    ctx.roundRect(handX + he.dir * 8 - 5, handY - 12, 10, 8, 2);
    ctx.fill();
    if (he.defeated) ctx.restore();
  }

  function drawHammerProjectile(hm) {
    ctx.save();
    ctx.translate(hm.x, hm.y);
    ctx.rotate((Date.now() / 120) % (Math.PI * 2));
    ctx.fillStyle = '#5E6470';
    ctx.beginPath();
    ctx.roundRect(-7, -4, 14, 8, 2);
    ctx.fill();
    ctx.strokeStyle = '#A7AFBC';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-8, 0);
    ctx.lineTo(8, 0);
    ctx.stroke();
    ctx.restore();
  }

  function drawSkyDropEnemy(se) {
    const nowMs = performance.now();
    if (se.defeated) {
      if (!se.vanishUntilMs || nowMs >= se.vanishUntilMs) return;
      ctx.save();
      ctx.globalAlpha = 0.14 + 0.86 * Math.abs(Math.sin(nowMs / 40));
    }
    const cx = se.x + se.w / 2;
    const cy = se.y + se.h / 2;
    ctx.fillStyle = '#C9A26B';
    ctx.beginPath();
    ctx.roundRect(se.x, se.y, se.w, se.h, 10);
    ctx.fill();
    ctx.strokeStyle = '#9E7B4A';
    ctx.lineWidth = 2;
    ctx.stroke();

    // 目
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(cx - 6, cy - 2, 3, 0, Math.PI * 2);
    ctx.arc(cx + 6, cy - 2, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#2B1B0E';
    ctx.beginPath();
    ctx.arc(cx - 6, cy - 2, 1.5, 0, Math.PI * 2);
    ctx.arc(cx + 6, cy - 2, 1.5, 0, Math.PI * 2);
    ctx.fill();

    // 落とすサイン（小さな点）
    ctx.fillStyle = 'rgba(40, 20, 10, 0.35)';
    ctx.beginPath();
    ctx.arc(cx, se.y + se.h - 6, 2.2, 0, Math.PI * 2);
    ctx.fill();
    if (se.defeated) ctx.restore();
  }

  function drawSkyDrop(d) {
    ctx.save();
    ctx.translate(d.x, d.y);
    ctx.rotate((Date.now() / 180) % (Math.PI * 2));
    ctx.fillStyle = '#B77A3A';
    ctx.beginPath();
    ctx.roundRect(-10, -8, 20, 16, 4);
    ctx.fill();
    ctx.strokeStyle = '#7A4C22';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();
  }

  function drawPalmTree(x, baseY, scale) {
    // 幹
    ctx.strokeStyle = '#8A5A2B';
    ctx.lineWidth = 8 * scale;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(x, baseY);
    ctx.lineTo(x + 8 * scale, baseY - 54 * scale);
    ctx.stroke();

    // 葉
    const topX = x + 8 * scale;
    const topY = baseY - 54 * scale;
    ctx.strokeStyle = '#3D8E49';
    ctx.lineWidth = 5 * scale;
    for (let i = -2; i <= 2; i++) {
      ctx.beginPath();
      ctx.moveTo(topX, topY);
      ctx.quadraticCurveTo(
        topX + i * 16 * scale,
        topY - 12 * scale,
        topX + i * 24 * scale,
        topY + (i === 0 ? -18 : -6) * scale
      );
      ctx.stroke();
    }
  }

  function drawCactus(h) {
    const cx = h.x + h.w * 0.5;
    const baseY = h.y + h.h;
    ctx.strokeStyle = '#3A7A42';
    ctx.lineWidth = 6;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(cx, baseY);
    ctx.lineTo(cx, h.y + 4);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(cx - 2, h.y + 18);
    ctx.lineTo(cx - 11, h.y + 10);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx + 2, h.y + 24);
    ctx.lineTo(cx + 12, h.y + 16);
    ctx.stroke();

    ctx.fillStyle = '#8D5E2C';
    ctx.beginPath();
    ctx.ellipse(cx, baseY + 2, 12, 3, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  function draw() {
    // 描画・BGM と同じ基準（loadStage で theme / bgmVariant が同期される）
    const isDesertStage = stageTheme === 'desert';
    const isBossArena = stageTheme === 'boss';
    const nowDrawMs = performance.now();
    const bossShake = isBossStage()
      ? getBossScreenShakeOffset(nowDrawMs)
      : { x: 0, y: 0 };

    if (isBossStage()) {
      ctx.save();
      ctx.translate(bossShake.x, bossShake.y);
      ctx.fillStyle = '#050308';
      ctx.fillRect(-48, -48, W + 96, H + 96);
    }

    if (isBossArena) {
      drawBossArenaBackground();
    } else if (isDesertStage) {
      if (desertBgReady) {
        // レイヤー分割はせず、背景1枚をそのまま表示
        drawTiledBackground(DESERT_BG, 0.12);
      } else {
        // 画像未読込時のフォールバック
        const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
        skyGrad.addColorStop(0, '#2C1B4D');
        skyGrad.addColorStop(0.5, '#D45A5A');
        skyGrad.addColorStop(1, '#FFC371');
        ctx.fillStyle = skyGrad;
        ctx.fillRect(0, 0, W, H);
      }

      // 砂漠の熱気（薄いオーバーレイ）
      const heatGrad = ctx.createLinearGradient(0, 0, 0, H);
      heatGrad.addColorStop(0, 'rgba(255, 150, 80, 0.06)');
      heatGrad.addColorStop(1, 'rgba(255, 220, 130, 0.1)');
      ctx.fillStyle = heatGrad;
      ctx.fillRect(0, 0, W, H);

      // 砂塵パーティクル
      drawSandParticles();
    } else {
      // 通常ステージ：空
      ctx.fillStyle = '#87CEEB';
      ctx.fillRect(0, 0, W, H);
      // 雲（パララックス）
      ctx.fillStyle = 'rgba(255,255,255,0.8)';
      for (let i = 0; i < 5; i++) {
        const cx = ((i * 400 - camX * 0.3) % worldWidth + worldWidth) % worldWidth;
        ctx.beginPath();
        ctx.arc(cx,      80 + i * 30, 20, 0, Math.PI * 2);
        ctx.arc(cx + 20, 80 + i * 30, 25, 0, Math.PI * 2);
        ctx.arc(cx + 40, 80 + i * 30, 20, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // 以降はカメラ座標系で描画
    ctx.save();
    ctx.translate(-camX, 0);

    // オアシスの奥にヤシの木
    if (oasis) {
      drawPalmTree(oasis.x + 52, oasis.y + 4, 1);
      drawPalmTree(oasis.x + oasis.w - 58, oasis.y + 6, 0.95);
      drawPalmTree(oasis.x + oasis.w * 0.5, oasis.y + 2, 0.85);
    }

    // 熱風ゾーンの可視化（薄い砂の帯）
    for (const wz of windZones) {
      ctx.fillStyle = 'rgba(232, 196, 122, 0.10)';
      ctx.fillRect(wz.x, wz.y, wz.w, wz.h);
      ctx.strokeStyle = 'rgba(190, 140, 70, 0.20)';
      ctx.lineWidth = 1;
      for (let i = 0; i < 5; i++) {
        const ly = wz.y + 12 + i * (wz.h / 5);
        ctx.beginPath();
        ctx.moveTo(wz.x + 8, ly);
        ctx.quadraticCurveTo(
          wz.x + wz.w * 0.5,
          ly + Math.sin((Date.now() / 250) + i) * 6,
          wz.x + wz.w - 8,
          ly + 1
        );
        ctx.stroke();
      }
    }

    // プラットフォーム
    for (const p of platforms) {
      if (p.disabled) continue;
      if (p.y >= 420) {
        // 地面：砂漠は砂色、ボスアリーナは土、通常は芝＋土
        ctx.fillStyle = isDesertStage
          ? '#F4D03F'
          : (isBossArena ? 'rgba(62, 39, 35, 0.78)' : '#7AB84D');
        ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.fillStyle = isDesertStage
          ? '#D4AC0D'
          : (isBossArena ? 'rgba(46, 32, 30, 0.82)' : '#8B6F47');
        ctx.fillRect(p.x, p.y + 8, p.w, p.h - 8);
        if (isDesertStage) {
          // 砂の質感（ドット/かすれ線）
          ctx.fillStyle = 'rgba(195, 146, 57, 0.45)';
          const dotCount = Math.max(3, Math.floor(p.w / 34));
          for (let i = 0; i < dotCount; i++) {
            const tx = p.x + 10 + i * ((p.w - 20) / dotCount);
            const ty = p.y + 6 + (i % 2) * 4;
            ctx.fillRect(tx, ty, 2, 2);
          }
          ctx.strokeStyle = 'rgba(173, 124, 44, 0.42)';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(p.x + 6, p.y + 13);
          ctx.lineTo(p.x + p.w - 10, p.y + 13);
          ctx.stroke();
        }
      } else {
        // 浮遊：砂漠は遺跡の石風、通常は紫系
        ctx.fillStyle = isDesertStage ? '#E5E7E9' : '#B88EE8';
        ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.fillStyle = isDesertStage ? '#B2BABB' : '#9F6FD4';
        ctx.fillRect(p.x, p.y + p.h - 4, p.w, 4);
        if (isDesertStage) {
          // 崩れる足場は予告で点滅
          if (p.kind === 'crumbling' && p.crumbleTriggeredAt > 0) {
            const blink = Math.floor(performance.now() / 80) % 2 === 0;
            if (blink) {
              ctx.fillStyle = 'rgba(215, 80, 65, 0.35)';
              ctx.fillRect(p.x, p.y, p.w, p.h);
            }
          }
          ctx.strokeStyle = 'rgba(120, 125, 130, 0.35)';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(p.x + 8, p.y + 7);
          ctx.lineTo(p.x + p.w - 8, p.y + 5);
          ctx.stroke();
        }
      }
    }

    // 高さ制限ゲート（低い天井）
    for (const g of ceilingGates) {
      ctx.fillStyle = '#D9C28A';
      ctx.fillRect(g.x, g.y, g.w, g.h);
      ctx.fillStyle = '#B89B62';
      ctx.fillRect(g.x, g.y + g.h - 6, g.w, 6);
      ctx.strokeStyle = 'rgba(130, 103, 62, 0.35)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(g.x + 8, g.y + 10);
      ctx.lineTo(g.x + g.w - 8, g.y + 8);
      ctx.stroke();
    }

    // サボテン障害物
    for (const hz of hazards) {
      if (hz.kind === 'cactus') drawCactus(hz);
    }

    // ボス：木本体・根・弾・アイテム（クリア後はボス絵は描かず消えたまま）
    if (isBossArena) {
      if (!gameWon) {
        drawBossTreeSprite(performance.now());
      }
      drawBossHitParticles();
      drawBossBranchGroundMarks(performance.now());
      for (const r of bossRoots) {
        const top = 420 - r.h;
        ctx.fillStyle = 'rgba(62, 39, 35, 0.92)';
        ctx.fillRect(r.x, top, r.w, r.h);
        ctx.strokeStyle = 'rgba(40, 25, 20, 0.5)';
        ctx.lineWidth = 2;
        ctx.strokeRect(r.x, top, r.w, r.h);
      }
      for (const a of bossApples) {
        drawBossProjectileApple(a);
      }
      for (const L of bossLeaves) {
        drawBossProjectileLeaf(L);
      }
      drawBossPickupSpawnFx();
      for (const s of bossStarPickups) {
        if (!s.collected) drawStar(s.x, s.y);
      }
      if (bossHealPickup && !bossHealPickup.collected) {
        drawLifeItem(bossHealPickup.x, bossHealPickup.y);
      }
    }

    // オアシス（水）
    if (oasis) {
      // 左右の縁（土手）を置いて、水が溜まる見た目にする
      ctx.fillStyle = '#C79A56';
      ctx.fillRect(oasis.x - 22, oasis.y - 10, 22, oasis.h + 10);
      ctx.fillRect(oasis.x + oasis.w, oasis.y - 10, 22, oasis.h + 10);
      ctx.fillStyle = '#A97A3D';
      ctx.fillRect(oasis.x - 22, oasis.y - 4, 22, 6);
      ctx.fillRect(oasis.x + oasis.w, oasis.y - 4, 22, 6);

      ctx.fillStyle = 'rgba(70, 170, 220, 0.42)';
      ctx.fillRect(oasis.x, oasis.y, oasis.w, oasis.h);
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      for (let i = 0; i < 5; i++) {
        const wx = oasis.x + 40 + i * 55 + Math.sin((Date.now() / 300) + i) * 6;
        const wy = oasis.y + 10 + Math.sin((Date.now() / 250) + i * 2) * 3;
        ctx.beginPath();
        ctx.ellipse(wx, wy, 18, 4, 0, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // ゴール旗（ボス戦では非表示）
    if (!isBossArena) {
      ctx.fillStyle = '#654321';
      ctx.fillRect(goal.x + 18, goal.y - 20, 3, 60);
      const flagOffset = goalFlagTaken ? 10 + Math.sin(clearTimer / 8) * 3 : 0;
      ctx.fillStyle = collected === stars.length ? '#FF4444' : '#AAAAAA';
      ctx.beginPath();
      ctx.moveTo(goal.x + 21, goal.y - 20 + flagOffset);
      ctx.lineTo(goal.x + 45 + (goalFlagTaken ? 3 : 0), goal.y - 12 + flagOffset);
      ctx.lineTo(goal.x + 21, goal.y - 4 + flagOffset);
      ctx.closePath();
      ctx.fill();
      if (goalFlagTaken) {
        ctx.fillStyle = 'rgba(255, 235, 120, 0.85)';
        for (let i = 0; i < 8; i++) {
          const a = (Math.PI * 2 * i) / 8 + clearTimer * 0.08;
          const r = 12 + (i % 2) * 6;
          ctx.beginPath();
          ctx.arc(goal.x + 23 + Math.cos(a) * r, goal.y - 12 + Math.sin(a) * r, 2.2, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    // 星
    for (const s of stars) {
      if (!s.collected) drawStar(s.x, s.y);
    }
    if (lifeItem && !lifeItem.collected) drawLifeItem(lifeItem.x, lifeItem.y);

    // 敵（撃破後は点滅消滅の間だけ描画）
    const drawT = performance.now();
    for (const e of enemies) {
      if (e.defeated && (!e.vanishUntilMs || drawT >= e.vanishUntilMs)) continue;
      drawEnemy(e);
    }
    for (const he of hammerEnemies) {
      if (he.defeated && (!he.vanishUntilMs || drawT >= he.vanishUntilMs)) continue;
      drawHammerEnemy(he);
    }
    for (const se of skyDropEnemies) {
      if (se.defeated && (!se.vanishUntilMs || drawT >= se.vanishUntilMs)) continue;
      drawSkyDropEnemy(se);
    }
    for (const hm of hammers) {
      drawHammerProjectile(hm);
    }
    for (const d of skyDrops) {
      drawSkyDrop(d);
    }
    for (const shot of starShots) {
      drawStarShot(shot);
    }

    // ルナモン：しっぽ攻撃エフェクト（前方判定と連動）
    drawLunamonTailSwipeEffect(performance.now());

    // プレイヤー
    drawPlayer(player.x, player.y);

    // ふわっとエフェクト（クリア演出中は非表示）
    if (player.floating && !gameWon) {
      ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.arc(
          player.x - 15 + i * 5,
          player.y + 20 + Math.sin(Date.now() / 100 + i) * 3,
          3, 0, Math.PI * 2
        );
        ctx.fill();
      }
    }

    ctx.restore();

    if (isBossArena && gameStarted && !gameWon) {
      drawBossHpBarScreen();
      drawBossDesperationFx(nowDrawMs);
    }

    if (isBossStage()) {
      ctx.restore();
    }
  }

  // ============================================
  // メインループ
  // ============================================
  let lastFrameTimeMs = performance.now();

  /** ボスとどめ後〜撃破演出中のスローモーション倍率（1＝通常） */
  function getCoupDeGraceSlowMultiplier(tMs) {
    if (!isBossStage() || bossDefeatPhase !== 1 || tMs >= bossDefeatUntilMs) {
      return 1;
    }
    const defeatT0 = bossDefeatUntilMs - BOSS_DEFEAT_ANIM_MS;
    const elapsed = tMs - defeatT0;
    if (elapsed < 900) return 0.2;
    return 0.52;
  }

  function loop(nowMs = performance.now()) {
    const rawDt = (nowMs - lastFrameTimeMs) / (1000 / 60);
    // タブ復帰時などの極端なスパイクを防ぐ
    const dt = Math.min(Math.max(rawDt, 0.5), 2.0);
    lastFrameTimeMs = nowMs;

    const slowMul = getCoupDeGraceSlowMultiplier(nowMs);
    update(dt * slowMul);
    draw();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  // Service Worker登録（PWA化用）
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js').catch(() => {
        // ローカル開発時は無視
      });
    });
  }
})();
</script>
