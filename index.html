  }

  /** 星／回復アイテム出現時のリッチ演出を生成 */
  function spawnBossPickupSpawnRichFx(cx, cy, mode) {
    const starGold = mode === 'star';
    bossPickupSpawnFx.push({
      kind: 'flash',
      x: cx,
      y: cy,
      t: 0,
      maxT: 16,
      starGold
    });
    for (let k = 0; k < 3; k++) {
      bossPickupSpawnFx.push({
        kind: 'ring',
        x: cx,
        y: cy,
        t: -k * 8,
        maxT: 44 + k * 10,
        starGold
      });
    }
    const n = starGold ? 24 : 28;
    for (let i = 0; i < n; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = 1.5 + Math.random() * 3.8;
      bossPickupSpawnFx.push({
        kind: 'particle',
        x: cx,
        y: cy,
        vx: Math.cos(a) * sp,
        vy: Math.sin(a) * sp - (starGold ? 1.4 : 1.9),
        life: 1,
        decay: 0.02 + Math.random() * 0.02,
        r: 1.4 + Math.random() * 3.2,
        starGold
      });
    }
    const upCount = starGold ? 10 : 14;
    for (let j = 0; j < upCount; j++) {
      bossPickupSpawnFx.push({
        kind: 'spark',
        x: cx + (Math.random() - 0.5) * 18,
        y: cy + (Math.random() - 0.5) * 10,
        vx: (Math.random() - 0.5) * 1.4,
        vy: -2.4 - Math.random() * 2.2,
        life: 1,
        decay: 0.017 + Math.random() * 0.012,
        r: 1.1 + Math.random() * 2.2,
        starGold
      });
    }
    if (starGold) {
      playSe('bossItemStar');
    } else {
      playSe('bossItemHeal');
    }
  }

  function updateBossPickupSpawnFx(dt) {
    for (let i = bossPickupSpawnFx.length - 1; i >= 0; i--) {
      const e = bossPickupSpawnFx[i];
      if (e.kind === 'ring' || e.kind === 'flash') {
        e.t += dt;
        if (e.t > e.maxT) bossPickupSpawnFx.splice(i, 1);
      } else {
        e.x += e.vx * dt;
        e.y += e.vy * dt;
        e.vy += (e.kind === 'spark' ? 0.06 : 0.11) * dt;
        e.life -= e.decay * dt;
        if (e.life <= 0) bossPickupSpawnFx.splice(i, 1);
      }
    }
  }

  function drawBossPickupSpawnFx() {
    const drawFlash = (e) => {
      if (e.kind !== 'flash' || e.t < 0) return;
      const u = e.t / e.maxT;
      const a = (1 - u) * 0.55;
      const g = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, 56 + (1 - u) * 40);
      if (e.starGold) {
        g.addColorStop(0, `rgba(255, 250, 210, ${a})`);
        g.addColorStop(0.35, `rgba(255, 220, 120, ${a * 0.55})`);
        g.addColorStop(1, 'rgba(255, 200, 80, 0)');
      } else {
        g.addColorStop(0, `rgba(255, 200, 220, ${a})`);
        g.addColorStop(0.4, `rgba(255, 130, 160, ${a * 0.5})`);
        g.addColorStop(1, 'rgba(200, 80, 120, 0)');
      }
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(e.x, e.y, 96, 0, Math.PI * 2);
      ctx.fill();
    };
    const drawRing = (e) => {
      if (e.kind !== 'ring' || e.t < 0) return;
      const u = Math.min(1, e.t / e.maxT);
      const rad = 10 + u * 58;
      const a = (1 - u) * (e.starGold ? 0.62 : 0.52);
      ctx.strokeStyle = e.starGold
        ? `rgba(255, 230, 140, ${a})`
        : `rgba(255, 150, 180, ${a})`;
      ctx.lineWidth = 3.2 - u * 2;
      ctx.beginPath();
      ctx.arc(e.x, e.y, rad, 0, Math.PI * 2);
      ctx.stroke();
    };
    for (const e of bossPickupSpawnFx) {
      if (e.kind === 'flash') drawFlash(e);
    }
    for (const e of bossPickupSpawnFx) {
      if (e.kind === 'ring') drawRing(e);
    }
    for (const e of bossPickupSpawnFx) {
      if (e.kind !== 'particle' && e.kind !== 'spark') continue;
      const al = Math.max(0, Math.min(1, e.life));
      ctx.globalAlpha = al * 0.95;
      if (e.starGold) {
        ctx.fillStyle = e.kind === 'spark' ? '#FFFDE7' : '#FFE082';
        ctx.shadowColor = 'rgba(255, 220, 120, 0.9)';
        ctx.shadowBlur = 6;
      } else {
        ctx.fillStyle = e.kind === 'spark' ? '#FCE4EC' : '#F48FB1';
        ctx.shadowColor = 'rgba(255, 150, 180, 0.75)';
        ctx.shadowBlur = 8;
      }
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.r * (0.85 + al * 0.15), 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }
    ctx.globalAlpha = 1;
  }

  /** 枝攻撃：地面から出る直前の赤点滅マーカー */
  function drawBossBranchGroundMarks(nowMs) {
    for (const m of bossBranchGroundMarks) {
      if (nowMs >= m.untilMs) continue;
      const blink = Math.floor(nowMs / 72) % 2 === 0;
      const cx = m.x + m.w * 0.5;
      const pulse = 0.85 + 0.15 * Math.sin(nowMs * 0.02 + m.x * 0.05);
      ctx.fillStyle = blink
        ? `rgba(240, 50, 50, ${0.52 * pulse})`
        : `rgba(130, 20, 30, ${0.38 * pulse})`;
      ctx.beginPath();
      ctx.ellipse(cx, 419, m.w * 0.55, 9 * pulse, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = blink ? 'rgba(255, 200, 200, 0.65)' : 'rgba(180, 80, 80, 0.45)';
      ctx.lineWidth = 2;
      ctx.stroke();
    }
  }

  function spawnRandomInBossArena() {
    const b = getBossPickupSpawnBounds();
    return {
      x: b.minX + Math.random() * (b.maxX - b.minX),
      y: b.minY + Math.random() * (b.maxY - b.minY)
    };
  }

  /** 次の攻撃種別（直前と同じは出さない） */
  function pickNextBossAttackKind() {
    const all = ['apple', 'leaf', 'branch'];
    const pool =
      bossLastAttackKind == null
        ? all
        : all.filter((k) => k !== bossLastAttackKind);
    return pool[Math.floor(Math.random() * pool.length)];
  }

  /** 葉っぱカッター：1枚（プレイヤー狙い・高速）。wave は 1〜3（ウェーブ識別用） */
  function spawnBossSingleLeaf(wave) {
    const lay = getBossArenaLayout();
    const ex = lay.blockLeft - 6;
    const ey = lay.dy + lay.destH * 0.32;
    const tx = player.x;
    const ty = player.y;
    const baseAng = Math.atan2(ty - ey, tx - ex);
    const sp = 8.6;
    const ang = baseAng + (Math.random() - 0.5) * 0.04;
    bossLeaves.push({
      x: ex,
      y: ey,
      vx: Math.cos(ang) * sp,
      vy: Math.sin(ang) * sp,
      age: 0,
      maxAge: 200,
      rot: ang,
      wobble: Math.random() * Math.PI * 2,
      leafWave: wave,
      fastLeaf: true
    });
  }

  /** リンゴ：幹付近から下へ転がり落ち、床で左へ転がる */
  function spawnBossRollingApple() {
    const lay = getBossArenaLayout();
    const r = 13 + Math.random() * 2.5;
    const ex = lay.blockLeft - 2;
    const ey = lay.dy + lay.destH * 0.3;
    bossApples.push({
      x: ex + (Math.random() - 0.5) * 12,
      y: ey - 8,
      vx: -0.35 + Math.random() * 0.7,
      vy: 1.35 + Math.random() * 0.75,
      r,
      bounces: 0,
      roll: true,
      trunkFall: true
    });
  }

  /** 枝3本のパラメータを生成（警告後に spawn する） */
  function buildBranchWaveSegments() {
    const b = getBossPickupSpawnBounds();
    const px = Math.max(b.minX + 8, Math.min(b.maxX - 8, player.x));
    const xs = [px - 16];
    for (let k = 0; k < 2; k++) {
      let cx = b.minX + Math.random() * (b.maxX - b.minX);
      let guard = 0;
      while (
        guard < 14 &&
        xs.some((zx) => Math.abs(zx - (cx - 16)) < 40 || Math.abs(px - 16 - (cx - 16)) < 40)
      ) {
        cx = b.minX + Math.random() * (b.maxX - b.minX);
        guard++;
      }
      xs.push(cx - 16);
    }
    const list = [];
    for (const rx of xs) {
      list.push({
        x: rx,
        w: 30 + Math.floor(Math.random() * 6),
        maxH: 58 + Math.random() * 36,
        vy: 16 + Math.random() * 5
      });
    }
    return list;
  }

  /** 地面の赤点滅マーカーのあと、枝を生やす */
  function beginBranchAttackWithWarning(nowMs) {
    const WARN_MS = 420;
    const list = buildBranchWaveSegments();
    bossBranchPendingSpawn = { list, spawnAtMs: nowMs + WARN_MS };
    bossBranchGroundMarks = list.map((s) => ({
      x: s.x,
      w: s.w,
      untilMs: nowMs + WARN_MS
    }));
    bossCombatMode = 'branch_warn';
    bossCombatUntilMs = nowMs + WARN_MS;
    playSe('bossWuBranchWarn');
  }

  function executeBranchPendingSpawn() {
    if (!bossBranchPendingSpawn) return;
    const list = bossBranchPendingSpawn.list;
    for (const seg of list) {
      bossRoots.push({
        x: seg.x,
        w: seg.w,
        h: 0,
        maxH: seg.maxH,
        vy: seg.vy,
        dealt: false,
        fade: 0,
        snapFast: true
      });
    }
    bossBranchPendingSpawn = null;
    bossBranchGroundMarks = [];
    playSe('bossAtkBranch');
    triggerBossScreenShake(5.5, 280);
    bossCombatMode = 'branch';
    // 根を生やしたウェーブ数（roots が空になったら次ウェーブへ）
    bossBranchStep++;
  }

  function triggerBossScreenShake(peakAmp, durationMs) {
    const n = performance.now();
    bossScreenShakeUntilMs = n + durationMs;
    bossScreenShakeStartMs = n;
    bossScreenShakeAmp = peakAmp;
  }

  function getBossScreenShakeOffset(nowMs) {
    if (nowMs >= bossScreenShakeUntilMs || bossScreenShakeAmp <= 0) {
      return { x: 0, y: 0 };
    }
    const dur = bossScreenShakeUntilMs - bossScreenShakeStartMs;
    const fade = dur > 0 ? (bossScreenShakeUntilMs - nowMs) / dur : 0;
    const mag = bossScreenShakeAmp * fade;
    const phase = nowMs * 0.09;
    return {
      x: Math.sin(phase) * mag * 0.95,
      y: Math.cos(phase * 1.31) * mag * 0.88
    };
  }

  function spawnBossHitParticles() {
    const u = getBossArenaLayout().hitUnion;
    const cx = u.x + u.w * 0.5;
    const cy = u.y + u.h * 0.32;
    for (let i = 0; i < 14; i++) {
      const isSpark = Math.random() > 0.48;
      bossHitParticles.push({
        x: cx + (Math.random() - 0.5) * u.w * 0.88,
        y: cy + (Math.random() - 0.5) * u.h * 0.78,
        vx: (Math.random() - 0.5) * 7.5,
        vy: (Math.random() - 0.5) * 7 - 2,
        life: 1,
        rot: Math.random() * Math.PI * 2,
        vr: (Math.random() - 0.5) * 0.18,
        kind: isSpark ? 'spark' : 'leaf'
      });
    }
  }

  /** HP5以下突入時：幹から噴き出すような余燼パーティクル */
  function spawnBossDesperationBurstParticles() {
    const u = getBossArenaLayout().hitUnion;
    const cx = u.x + u.w * 0.5;
    const cy = u.y + u.h * 0.34;
    for (let i = 0; i < 48; i++) {
      const ang = (Math.PI * 2 * i) / 48 + (Math.random() - 0.5) * 0.35;
      const sp = 3.2 + Math.random() * 10;
      bossHitParticles.push({
        x: cx + (Math.random() - 0.5) * u.w * 0.55,
        y: cy + (Math.random() - 0.5) * u.h * 0.5,
        vx: Math.cos(ang) * sp,
        vy: Math.sin(ang) * sp - 2.2,
        life: 1.2 + Math.random() * 0.35,
        rot: Math.random() * Math.PI * 2,
        vr: (Math.random() - 0.5) * 0.28,
        kind: 'ember'
      });
    }
  }

  function updateBossHitParticles(dt) {
    const g = 0.14;
    for (let i = bossHitParticles.length - 1; i >= 0; i--) {
      const p = bossHitParticles[i];
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += g * dt;
      p.vx *= Math.pow(0.984, dt);
      p.rot += (p.vr || 0) * dt;
      // 余燼は少し長く残す
      const decay = p.kind === 'ember' ? 0.026 : 0.036;
      p.life -= decay * dt;
      if (p.life <= 0) bossHitParticles.splice(i, 1);
    }
  }

  function drawBossHitParticles() {
    for (const p of bossHitParticles) {
      if (p.kind === 'spark') {
        const a = Math.max(0, Math.min(1, p.life));
        ctx.globalAlpha = a * 0.95;
        ctx.fillStyle = `rgba(255, 248, 210, ${0.35 + a * 0.55})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 1.6 + a * 2.4, 0, Math.PI * 2);
        ctx.fill();
      } else if (p.kind === 'ember') {
        const a = Math.max(0, Math.min(1, p.life));
        ctx.globalAlpha = a * 0.9;
        const r = 255;
        const g0 = 80 + (1 - a) * 70;
        const b0 = 30 + (1 - a) * 20;
        ctx.fillStyle = `rgba(${r}, ${g0}, ${b0}, ${0.45 + 0.45 * a})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 2 + (1 - a) * 2.2, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.globalAlpha = Math.max(0, Math.min(1, p.life + 0.22));
        ctx.fillStyle = '#1B5E20';
        ctx.fillRect(-5, -2, 10, 4);
        ctx.fillStyle = '#4CAF50';
        ctx.fillRect(-4, -1.5, 6, 2);
        ctx.restore();
      }
    }
    ctx.globalAlpha = 1;
  }

  function drawBossArenaBackground() {
    if (bossArenaBgReady && BOSS_ARENA_BG.naturalWidth > 0) {
      const iw = BOSS_ARENA_BG.naturalWidth;
      const ih = BOSS_ARENA_BG.naturalHeight;
      const scale = Math.max(W / iw, H / ih);
      const dw = iw * scale;
      const dh = ih * scale;
      const dx = (W - dw) * 0.5;
      const dy = (H - dh) * 0.5;
      ctx.drawImage(BOSS_ARENA_BG, 0, 0, iw, ih, dx, dy, dw, dh);
    } else {
      const bg = ctx.createLinearGradient(0, 0, 0, H);
      bg.addColorStop(0, '#12081f');
      bg.addColorStop(0.55, '#2a1840');
      bg.addColorStop(1, '#3d2458');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = 'rgba(40, 24, 60, 0.35)';
      ctx.fillRect(0, 360, W, 90);
    }
  }

  function drawBossProjectileApple(a) {
    ctx.fillStyle = '#E53935';
    ctx.beginPath();
    ctx.arc(a.x, a.y, a.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#33691E';
    ctx.fillRect(a.x - 2, a.y - a.r - 4, 4, 6);
  }

  function drawBossProjectileLeaf(L) {
    ctx.save();
    ctx.translate(L.x, L.y);
    ctx.rotate(L.rot || 0);
    ctx.scale(1.2, 1.2);
    ctx.fillStyle = '#2E7D32';
    ctx.beginPath();
    ctx.moveTo(10, 0);
    ctx.quadraticCurveTo(0, -8, -12, 0);
    ctx.quadraticCurveTo(0, 8, 10, 0);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  function drawBossTreeSprite(nowMs) {
    const lay = getBossArenaLayout();
    const cx = lay.dx + lay.destW * 0.5;
    const baseY = lay.dy + lay.destH;
    let alpha = 1;
    let scaleBoss = 1;
    let sway = 0;
    let squashY = 1;
    let redWindup = false;
    let hurtBlink = false;

    if (bossDefeatPhase === 1) {
      const u = Math.max(
        0,
        Math.min(1, (nowMs - (bossDefeatUntilMs - BOSS_DEFEAT_ANIM_MS)) / BOSS_DEFEAT_ANIM_MS)
      );
      const blink = Math.abs(Math.sin(nowMs / 42));
      alpha = (1 - u) * (0.28 + 0.72 * blink);
      scaleBoss = 1 - u * 0.22;
    } else {
      if (nowMs < bossInvincibleUntilMs) {
        hurtBlink = Math.floor(nowMs / 100) % 2 === 0;
      }
      if (bossCombatMode === 'wu_branch') {
        redWindup = Math.floor(nowMs / 85) % 2 === 0;
      } else if (bossCombatMode === 'wu_leaf') {
        sway = Math.sin(nowMs * 0.017) * 9;
      } else if (bossCombatMode === 'wu_apple') {
        squashY = 1 + Math.sin(nowMs * 0.021) * 0.065;
      }
    }

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(cx + sway, baseY);
    ctx.scale(scaleBoss, scaleBoss * squashY);
    ctx.translate(-cx, -baseY);

    if (bossSheetReady && lay.sw > 0 && lay.sh > 0) {
      // PNG 全体をソースからそのまま描画（横半分などのトリミングはしない）
      ctx.drawImage(
        BOSS_SHEET,
        0,
        0,
        lay.sw,
        lay.sh,
        lay.dx,
        lay.dy,
        lay.destW,
        lay.destH
      );
      // 点滅は外接矩形ではなく、描画済みピクセル（PNG のアルファ）にだけ重ねる
      if (hurtBlink) {
        ctx.globalCompositeOperation = 'source-atop';
        ctx.fillStyle = 'rgba(255, 255, 255, 0.38)';
        ctx.fillRect(lay.dx, lay.dy, lay.destW, lay.destH);
        ctx.globalCompositeOperation = 'source-over';
      } else if (redWindup) {
        ctx.globalCompositeOperation = 'source-atop';
        ctx.fillStyle = 'rgba(210, 55, 55, 0.48)';
        ctx.fillRect(lay.dx, lay.dy, lay.destW, lay.destH);
        ctx.globalCompositeOperation = 'source-over';
      } else if (bossIsDesperationPhase() && bossDefeatPhase === 0) {
        // 狂暴化中：幹に脈打つ赤み（被弾点滅・枝予備より弱く）
        ctx.globalCompositeOperation = 'source-atop';
        const pulse = 0.085 + Math.sin(nowMs * 0.011) * 0.042;
        ctx.fillStyle = `rgba(120, 18, 14, ${pulse})`;
        ctx.fillRect(lay.dx, lay.dy, lay.destW, lay.destH);
        ctx.globalCompositeOperation = 'source-over';
      }
    } else {
      ctx.fillStyle = '#5D4037';
      ctx.fillRect(lay.dx, lay.dy, lay.destW, lay.destH);
      ctx.fillStyle = '#81C784';
      ctx.fillRect(lay.dx + lay.destW * 0.1, lay.dy - 40, lay.destW * 0.8, 50);
      const ov = lay.hitUnion;
      if (redWindup) {
        ctx.fillStyle = 'rgba(200, 40, 40, 0.42)';
        ctx.fillRect(ov.x, ov.y, ov.w, ov.h);
      }
      if (hurtBlink) {
        ctx.fillStyle = 'rgba(255, 255, 255, 0.38)';
        ctx.fillRect(ov.x, ov.y, ov.w, ov.h);
      } else if (bossIsDesperationPhase() && bossDefeatPhase === 0) {
        const pulse = 0.14 + Math.sin(nowMs * 0.011) * 0.07;
        ctx.fillStyle = `rgba(90, 16, 10, ${pulse})`;
        ctx.fillRect(ov.x, ov.y, ov.w, ov.h);
      }
    }
    ctx.restore();
  }

  function drawBossHpBarScreen() {
    const barW = 280;
    const barH = 12;
    const bx = (W - barW) * 0.5;
    const by = 10;
    const ratio = Math.max(0, bossHp / BOSS_MAX_HP);

    // 茨っぽい装飾（バーの上下）
    ctx.strokeStyle = 'rgba(46, 74, 26, 0.85)';
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    for (let s = -1; s <= 1; s += 2) {
      const baseY = s < 0 ? by - 3 : by + barH + 3;
      ctx.beginPath();
      ctx.moveTo(bx - 20, baseY);
      for (let i = 1; i <= 36; i++) {
        const t = i / 36;
        const px = bx - 16 + t * (barW + 32);
        const py = baseY + Math.sin(t * Math.PI * 4.2) * (4.5 * s);
        ctx.lineTo(px, py);
      }
      ctx.stroke();
    }
    for (let i = 0; i < 9; i++) {
      const tx = bx - 8 + (i / 8) * (barW + 16);
      const tyTop = by - 2;
      ctx.fillStyle = 'rgba(27, 94, 32, 0.9)';
      ctx.beginPath();
      ctx.moveTo(tx, tyTop);
      ctx.lineTo(tx + 4, tyTop - 7);
      ctx.lineTo(tx + 8, tyTop);
      ctx.closePath();
      ctx.fill();
      const tyBot = by + barH + 2;
      ctx.beginPath();
      ctx.moveTo(tx, tyBot);
      ctx.lineTo(tx + 4, tyBot + 7);
      ctx.lineTo(tx + 8, tyBot);
      ctx.closePath();
      ctx.fill();
    }

    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(bx - 3, by - 3, barW + 6, barH + 6);
    ctx.strokeStyle = 'rgba(139, 195, 74, 0.55)';
    ctx.lineWidth = 1;
    ctx.strokeRect(bx - 2.5, by - 2.5, barW + 5, barH + 5);
    ctx.fillStyle = '#3E2723';
    ctx.fillRect(bx, by, barW, barH);
    ctx.fillStyle = ratio > 0.35 ? '#66BB6A' : '#EF5350';
    ctx.fillRect(bx, by, barW * ratio, barH);

    // 狂暴化中：HP バー外周の脈打つ赤枠
    if (bossIsDesperationPhase() && bossDefeatPhase === 0) {
      const throb = 0.5 + Math.sin(performance.now() * 0.008) * 0.45;
      ctx.strokeStyle = `rgba(200, 45, 38, ${0.5 + throb * 0.42})`;
      ctx.lineWidth = 2.5;
      ctx.strokeRect(bx - 6, by - 6, barW + 12, barH + 12);
    }

    // ゲージの直下にボス名のみ（数値は出さない）
    const bossNameLabel = 'トレットン';
    const nameY = by + barH + 10;
    ctx.save();
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.strokeStyle = 'rgba(0, 0, 0, 0.62)';
    ctx.lineWidth = 3;
    ctx.strokeText(bossNameLabel, W * 0.5, nameY);
    ctx.fillStyle = 'rgba(248, 252, 232, 0.96)';
    ctx.fillText(bossNameLabel, W * 0.5, nameY);
    if (bossIsDesperationPhase() && bossDefeatPhase === 0) {
      ctx.font = 'bold 10px sans-serif';
      const subA = 0.72 + Math.sin(performance.now() * 0.009) * 0.22;
      ctx.strokeStyle = 'rgba(20, 0, 0, 0.55)';
      ctx.lineWidth = 2;
      ctx.strokeText('狂暴化 · 攻撃激化', W * 0.5, nameY + 15);
      ctx.fillStyle = `rgba(255, 185, 160, ${subA})`;
      ctx.fillText('狂暴化 · 攻撃激化', W * 0.5, nameY + 15);
    }
    ctx.restore();
  }

  /** HP5以下：画面端の赤み・突入フラッシュ・案内バナー */
  function drawBossDesperationFx(nowMs) {
    if (!isBossStage() || bossDefeatPhase !== 0 || gameWon) return;

    if (bossIsDesperationPhase()) {
      const pulse = 0.05 + Math.sin(nowMs * 0.004) * 0.026;
      const rg = ctx.createRadialGradient(
        W * 0.5,
        H * 0.5,
        Math.min(W, H) * 0.12,
        W * 0.5,
        H * 0.5,
        Math.max(W, H) * 0.72
      );
      rg.addColorStop(0, 'rgba(30, 0, 0, 0)');
      rg.addColorStop(1, `rgba(95, 6, 6, ${pulse})`);
      ctx.fillStyle = rg;
      ctx.fillRect(0, 0, W, H);
    }

    if (nowMs < bossDesperationFxUntilMs) {
      const t = (bossDesperationFxUntilMs - nowMs) / 860;
      ctx.fillStyle = `rgba(210, 40, 28, ${0.1 + t * 0.34})`;
      ctx.fillRect(0, 0, W, H);
    }

    if (nowMs < bossDesperationBannerUntilMs) {
      const bannerDur = 3600;
      const rem = bossDesperationBannerUntilMs - nowMs;
      const fadeIn = Math.min(1, (bannerDur - rem) / 420);
      const fadeOut = rem < 820 ? rem / 820 : 1;
      const alpha = 0.92 * fadeIn * fadeOut;
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.font = 'bold 16px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const ty = 88;
      const msg = '根が疼き… 攻撃が激化！';
      ctx.strokeStyle = 'rgba(0, 0, 0, 0.75)';
      ctx.lineWidth = 5;
      ctx.strokeText(msg, W * 0.5, ty);
      ctx.fillStyle = 'rgba(255, 238, 220, 0.98)';
      ctx.fillText(msg, W * 0.5, ty);
      ctx.restore();
    }
  }

  function damageBossIfAlive() {
    const t = performance.now();
    if (!isBossStage() || bossHp <= 0 || bossDefeatPhase !== 0) return;
    if (t < bossInvincibleUntilMs) return;
    bossHp--;
    bossInvincibleUntilMs = t + 2000;
    if (bossHp === 5) {
      bossDesperationFxUntilMs = t + 860;
      bossDesperationBannerUntilMs = t + 3600;
      spawnBossDesperationBurstParticles();
    }
    spawnBossHitParticles();
    if (bossHp === 5) {
      triggerBossScreenShake(8.2, 430);
    } else {
      triggerBossScreenShake(3.6, 165);
    }
    updateHud();
    if (bossHp <= 0) {
      bossHp = 0;
      bossDefeatPhase = 1;
      bossDefeatUntilMs = t + BOSS_DEFEAT_ANIM_MS;
      bossDefeatVanishSeMs = t;
      bossCombatMode = 'wait';
      bossBranchStep = 0;
      bossApples = [];
      bossLeaves = [];
      bossRoots = [];
      bossHitParticles = [];
      bossPickupSpawnFx = [];
      bossBranchGroundMarks = [];
      bossBranchPendingSpawn = null;
      bossDesperationFxUntilMs = 0;
      bossDesperationBannerUntilMs = 0;
      // 敵撃破と同じボイス＋撃破系合成SE（最後の一撃のみ）
      playSe('enemyDefeat');
    } else {
      // 通常ヒット時は撃破音とは別の短い SE
      playSe('bossTakeDamage');
    }
  }

  function updateBossBattle(dt, nowMs) {
    if (!isBossStage() || gameWon) return;
    updateBossHitParticles(dt);
    updateBossPickupSpawnFx(dt);

    if (bossDefeatPhase === 1) {
      if (nowMs >= bossDefeatUntilMs) {
        gameWon = true;
        goalFlagTaken = true;
        clearTimer = 0;
        stopBossFileBgm();
        playSe('fanfare');
        showMessage('トレットンを撃破！\nゲームクリア！\nおつかれさま');
        clearActionsEl.style.display = 'block';
        bossDefeatPhase = 2;
        updateHud();
      } else {
        const defeatT0 = bossDefeatUntilMs - BOSS_DEFEAT_ANIM_MS;
        if (
          nowMs >= defeatT0 + 160 &&
          nowMs - bossDefeatVanishSeMs >= 105
        ) {
          bossDefeatVanishSeMs = nowMs;
          playSe('enemyVanishTick');
        }
      }
      return;
    }

    if (bossHp <= 0) return;

    // 星アイテム（4秒ごと、フィールド最大2）
    if (nowMs >= bossNextStarAtMs) {
      bossNextStarAtMs = nowMs + 4000;
      let active = 0;
      for (const s of bossStarPickups) {
        if (!s.collected) active++;
      }
      const b = getBossPickupSpawnBounds();
      if (b.maxX > b.minX) {
        while (active < 2) {
          const p = spawnRandomInBossArena();
          bossStarPickups.push({ x: p.x, y: p.y, collected: false });
          spawnBossPickupSpawnRichFx(p.x, p.y, 'star');
          active++;
        }
      }
    }

    // 回復（10秒ごと・ランダム位置、未回収のときだけ1つ）
    if (nowMs >= bossNextHealAtMs) {
      bossNextHealAtMs = nowMs + 10000;
      if (!bossHealPickup) {
        const p = spawnRandomInBossArena();
        bossHealPickup = { x: p.x, y: p.y, collected: false };
        spawnBossPickupSpawnRichFx(p.x, p.y, 'heal');
      }
    }

    const wu = bossWindupDurationScale();
    // 攻撃状態機械（ランダムループ・直前と同じ技は出さない）
    if (bossCombatMode === 'wait') {
      if (nowMs >= bossNextPatternAtMs) {
        const k = pickNextBossAttackKind();
        bossLastAttackKind = k;
        if (k === 'apple') {
          bossCombatMode = 'wu_apple';
          bossCombatUntilMs = nowMs + BOSS_WU_APPLE_MS * wu;
          playSe('bossWuApple');
        } else if (k === 'leaf') {
          bossCombatMode = 'wu_leaf';
          bossCombatUntilMs = nowMs + BOSS_WU_LEAF_MS * wu;
          playSe('bossWuLeaf');
        } else {
          bossCombatMode = 'wu_branch';
          bossCombatUntilMs = nowMs + BOSS_WU_BRANCH_MS * wu;
          playSe('bossWuBranch');
        }
      }
    } else if (bossCombatMode === 'wu_apple') {
      if (nowMs >= bossCombatUntilMs) {
        bossCombatMode = 'apple';
        bossAppleSpawnsDone = 0;
        bossNextAppleSpawnAtMs = nowMs;
      }
    } else if (bossCombatMode === 'wu_leaf') {
      if (nowMs >= bossCombatUntilMs) {
        bossLeafBurstCount = 0;
        bossLeafBurstNextAtMs = nowMs;
        bossCombatMode = 'leaf1';
      }
    } else if (bossCombatMode === 'wu_branch') {
      if (nowMs >= bossCombatUntilMs) {
        beginBranchAttackWithWarning(nowMs);
      }
    } else if (bossCombatMode === 'branch_warn') {
      if (nowMs >= bossCombatUntilMs && bossBranchPendingSpawn) {
        executeBranchPendingSpawn();
      }
    } else if (bossCombatMode === 'apple') {
      const appleCap = bossAppleSpawnCap();
      if (nowMs >= bossNextAppleSpawnAtMs && bossAppleSpawnsDone < appleCap) {
        spawnBossRollingApple();
        playSe('bossAtkApple');
        bossAppleSpawnsDone++;
        bossNextAppleSpawnAtMs = nowMs + bossAppleSpawnIntervalMs();
      }
      if (bossAppleSpawnsDone >= appleCap) {
        bossCombatMode = 'wait';
        bossNextPatternAtMs =
          nowMs +
          BOSS_PATTERN_COOLDOWN_MIN +
          Math.random() *
            (BOSS_PATTERN_COOLDOWN_MAX - BOSS_PATTERN_COOLDOWN_MIN);
      }
    } else if (bossCombatMode === 'leaf1') {
      if (bossLeafBurstCount < 3 && nowMs >= bossLeafBurstNextAtMs) {
        if (bossLeafBurstCount === 0) {
          playSe('bossAtkLeaf');
        }
        spawnBossSingleLeaf(1);
        bossLeafBurstCount++;
        bossLeafBurstNextAtMs = nowMs + BOSS_LEAF_BURST_INTERVAL_MS;
      }
      if (
        bossLeafBurstCount >= 3 &&
        !bossLeaves.some((L) => L.leafWave === 1)
      ) {
        bossLeafWaveAfterGap = 2;
        bossCombatMode = 'leaf_gap';
        bossCombatUntilMs = nowMs + bossLeafWaveGapActiveMs();
      }
    } else if (bossCombatMode === 'leaf_gap') {
      if (nowMs >= bossCombatUntilMs) {
        bossLeafBurstCount = 0;
        bossLeafBurstNextAtMs = nowMs;
        bossCombatMode = bossLeafWaveAfterGap === 3 ? 'leaf3' : 'leaf2';
      }
    } else if (bossCombatMode === 'leaf2') {
      if (bossLeafBurstCount < 3 && nowMs >= bossLeafBurstNextAtMs) {
        if (bossLeafBurstCount === 0) {
          playSe('bossAtkLeaf');
        }
        spawnBossSingleLeaf(2);
        bossLeafBurstCount++;
        bossLeafBurstNextAtMs = nowMs + BOSS_LEAF_BURST_INTERVAL_MS;
      }
      if (
        bossLeafBurstCount >= 3 &&
        !bossLeaves.some((L) => L.leafWave === 2)
      ) {
        if (bossLeafWaveCap() >= 3) {
          bossLeafWaveAfterGap = 3;
          bossCombatMode = 'leaf_gap';
          bossCombatUntilMs = nowMs + bossLeafWaveGapActiveMs();
        } else {
          bossCombatMode = 'wait';
          bossNextPatternAtMs =
            nowMs +
            BOSS_PATTERN_COOLDOWN_MIN +
            Math.random() *
              (BOSS_PATTERN_COOLDOWN_MAX - BOSS_PATTERN_COOLDOWN_MIN);
        }
      }
    } else if (bossCombatMode === 'leaf3') {
      if (bossLeafBurstCount < 3 && nowMs >= bossLeafBurstNextAtMs) {
        if (bossLeafBurstCount === 0) {
          playSe('bossAtkLeaf');
        }
        spawnBossSingleLeaf(3);
        bossLeafBurstCount++;
        bossLeafBurstNextAtMs = nowMs + BOSS_LEAF_BURST_INTERVAL_MS;
      }
      if (
        bossLeafBurstCount >= 3 &&
        !bossLeaves.some((L) => L.leafWave === 3)
      ) {
        bossCombatMode = 'wait';
        bossNextPatternAtMs =
          nowMs +
          BOSS_PATTERN_COOLDOWN_MIN +
          Math.random() *
            (BOSS_PATTERN_COOLDOWN_MAX - BOSS_PATTERN_COOLDOWN_MIN);
      }
    } else if (bossCombatMode === 'branch') {
      if (bossRoots.length === 0) {
        const branchCap = bossBranchWaveCap();
        if (bossBranchStep < branchCap) {
          beginBranchAttackWithWarning(nowMs);
        } else {
          bossCombatMode = 'wait';
          bossBranchStep = 0;
          bossNextPatternAtMs =
            nowMs +
            BOSS_PATTERN_COOLDOWN_MIN +
            Math.random() *
              (BOSS_PATTERN_COOLDOWN_MAX - BOSS_PATTERN_COOLDOWN_MIN);
        }
      }
    }

    // リンゴ更新（幹から落下 → 床転がり / 旧フォーマット互換）
    for (let i = bossApples.length - 1; i >= 0; i--) {
      const a = bossApples[i];
      if (a.roll && a.trunkFall) {
        a.vy += GRAVITY * 1.05 * dt;
        a.x += a.vx * dt;
        a.y += a.vy * dt;
        a.vx *= Math.pow(0.998, dt);
        if (a.y + a.r >= 419) {
          a.trunkFall = false;
          a.y = 420 - a.r;
          a.vy = 0;
          a.vx = -4.1 - Math.random() * 1.4;
        }
        if (a.x < -50 || a.x > W + 60 || a.y > H + 50) {
          bossApples.splice(i, 1);
        }
      } else if (a.roll) {
        a.vy += GRAVITY * 0.95 * dt;
        a.x += a.vx * dt;
        a.y += a.vy * dt;
        if (a.y + a.r >= 420) {
          a.y = 420 - a.r;
          // 床に下向きで着地したときだけ跳ね返り高さをランダム化（毎フレーム乱数しない）
          if (a.vy > 0.25) {
            a.vy = -(4.4 + Math.random() * 6.8);
            a.bounces++;
            a.vx *= 0.96;
          }
        }
        if (a.x < -50 || a.x > W + 60 || a.y > H + 50) {
          bossApples.splice(i, 1);
        }
      } else {
        a.vy += GRAVITY * 1.05 * dt;
        a.y += a.vy * dt;
        if (a.y + a.r >= 420) {
          a.y = 420 - a.r;
          a.vy = -Math.abs(a.vy) * 0.48;
          a.bounces++;
          if (a.bounces >= 3) {
            bossApples.splice(i, 1);
            continue;
          }
        }
        if (a.y > H + 40 || a.x < -40 || a.x > W + 40) {
          bossApples.splice(i, 1);
        }
      }
    }

    // 葉更新
    for (let i = bossLeaves.length - 1; i >= 0; i--) {
      const L = bossLeaves[i];
      L.age += dt;
      const pm = L.fastLeaf ? 0.032 : 0.08;
      const perpX = -L.vy * pm * Math.sin(L.age * 0.14 + L.wobble);
      const perpY = L.vx * pm * Math.sin(L.age * 0.14 + L.wobble);
      L.x += (L.vx + perpX) * dt;
      L.y += (L.vy + perpY) * dt;
      L.rot = Math.atan2(L.vy + perpY, L.vx + perpX);
      if (L.age > L.maxAge || L.x < -60 || L.x > W + 60 || L.y < -80 || L.y > H + 40) {
        bossLeaves.splice(i, 1);
      }
    }

    // 根更新（下から伸びる）
    for (let i = bossRoots.length - 1; i >= 0; i--) {
      const r = bossRoots[i];
      r.h += r.vy * dt;
      if (r.h >= r.maxH) {
        r.h = r.maxH;
        r.vy = 0;
      }
      const topY = 420 - r.h;
      const rootRect = { x: r.x, y: topY, w: r.w, h: r.h };
      if (
        !r.dealt &&
        r.h > 18 &&
        rectCircleCollide(rootRect, player.x, player.y, player.r)
      ) {
        r.dealt = true;
        if (!isInvincible()) {
          playSe('bossHitRoot');
          // 敵接触時と同じ被ダメージボイス（bossHit* は合成のみのため別途再生）
          playVoice('enemy');
          onPlayerDamage(true);
        }
      }
      if (r.h >= r.maxH && r.vy === 0) {
        r.fade = (r.fade || 0) + dt * (r.snapFast ? 2.8 : 1);
        const fadeMax = r.snapFast ? 5 : 28;
        if (r.fade > fadeMax) bossRoots.splice(i, 1);
      }
    }

    // ボス弾とプレイヤー（当たった弾は削除）
    if (!isInvincible()) {
      for (let i = bossApples.length - 1; i >= 0; i--) {
        const a = bossApples[i];
        const dx = player.x - a.x;
        const dy = player.y - a.y;
        if (dx * dx + dy * dy < (player.r + a.r) * (player.r + a.r)) {
          bossApples.splice(i, 1);
          playSe('bossHitApple');
          playVoice('enemy');
          onPlayerDamage(true);
          break;
        }
      }
      for (let i = bossLeaves.length - 1; i >= 0; i--) {
        const L = bossLeaves[i];
        const dx = player.x - L.x;
        const dy = player.y - L.y;
        if (dx * dx + dy * dy < (player.r + BOSS_LEAF_HIT_R) * (player.r + BOSS_LEAF_HIT_R)) {
          bossLeaves.splice(i, 1);
          playSe('bossHitLeaf');
          playVoice('enemy');
          onPlayerDamage(true);
          break;
        }
      }
    }

    // 星アイテム回収（通常ステージと同じボイス＋SE）
    for (const s of bossStarPickups) {
      if (s.collected) continue;
      const dx = player.x - s.x;
      const dy = player.y - s.y;
      if (dx * dx + dy * dy < 32 * 32) {
        s.collected = true;
        starAmmo++;
        playSe('star');
        updateHud();
      }
    }

    if (bossHealPickup && !bossHealPickup.collected) {
      const dx = player.x - bossHealPickup.x;
      const dy = player.y - bossHealPickup.y;
      if (dx * dx + dy * dy < 32 * 32) {
        bossHealPickup.collected = true;
        bossHealPickup = null;
        lives++;
        playSe('life');
        updateHud();
      }
    }
  }

  function loadStage(stageName) {
    currentStageId = stageName;
    let data = createStage1();
    if (stageName === 'stage2') data = createStage2();
    if (stageName === 'stage3') data = createStage3();
    if (stageName === 'stage4') data = createStage4();
    worldWidth = data.worldWidth;
    platforms = data.platforms.map((p) => ({
      ...p,
      baseY: p.y,
      disabled: false,
      sinkActivated: false,
      crumbleTriggeredAt: 0
    }));
    stars = data.stars.map((s) => ({...s}));
    goal = {...data.goal};
    stageHoles = (data.holes || []).map((h) => ({...h}));
    stageTheme = data.theme || 'normal';
    oasis = data.oasis ? {...data.oasis} : null;
    ceilingGates = (data.ceilingGates || []).map((g) => ({...g}));
    windZones = (data.windZones || []).map((z) => ({...z}));
    gameOverMenuActive = false;
    gameOverPanelEl.style.display = 'none';
    enemies = data.enemies.map((e) => ({
      ...e,
      defeated: false,
      vanishUntilMs: 0,
      vanishLastSeMs: 0
    }));
    hammerEnemies = (data.hammerEnemies || []).map((he) => ({
      ...he,
      defeated: false,
      vanishUntilMs: 0,
      vanishLastSeMs: 0
    }));
    skyDropEnemies = (data.skyDropEnemies || []).map((se) => ({
      ...se,
      defeated: false,
      vanishUntilMs: 0,
      vanishLastSeMs: 0
    }));
    skyDrops = [];
    hazards = (data.hazards || []).map((h) => ({...h}));
    lifeItem = data.lifeItem ? {...data.lifeItem} : null;
    hammers = [];
    starShots = [];
    currentStageName =
      stageName === 'stage2' ? 'ステージ2' :
      stageName === 'stage3' ? 'ステージ3' :
      stageName === 'stage4' ? 'ステージ4・ボス' : 'ステージ1';
    audio.bgmVariant =
      stageName === 'stage2' ? 'stage2' :
      stageName === 'stage3' ? 'desert' :
      stageName === 'stage4' ? 'boss' :
      'stage1';
    restartBgmIfRunning();
    updateStatusLabel();
    reset();
    // ステージ選択はユーザージェスチャー内なので、この瞬間に AudioContext を起動（rAF 内の予備SEが無音になるのを防ぐ）
    ensureAudioContext();
  }

  function startGame(stageName) {
    gamePaused = false;
    pausePanelEl.style.display = 'none';
    gameOverMenuActive = false;
    gameOverPanelEl.style.display = 'none';
    // loadStage で bgmVariant と BGM タイマーを先に確定させてから resume（旧 variant での二重 schedule を防ぐ）
    loadStage(stageName);
    resumeGameplayAudio();
    gameStarted = true;
    stageSelectEl.style.display = 'none';
    syncPauseOpenButtonVisibility();
  }
