<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#87CEEB">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Puni Adventure - ピンクの何か</title>
<link rel="manifest" href="manifest.json">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%;
    height: 100%;
    min-height: 100dvh;
    overflow: hidden;
    background: #2a2a2a;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    user-select: none; -webkit-user-select: none;
  }
  body {
    display: flex; align-items: center; justify-content: center;
  }

  #wrapper {
    position: relative;
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    max-width: 100vw;
    max-height: 100vh;
    max-height: 100dvh;
  }

  #top-bar {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 16px;
    color: #fff;
    font-size: 14px;
    z-index: 10;
    background: linear-gradient(rgba(0,0,0,0.3), transparent);
    pointer-events: none;
  }

  #game-container {
    position: relative;
    width: 100%; height: 100%;
    background: #87CEEB;
    overflow: hidden;
    touch-action: none;
    padding-bottom: env(safe-area-inset-bottom);
  }

  canvas {
    display: block;
    width: 100%; height: 100%;
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
  }

  .btn {
    position: absolute;
    display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.4);
    border: 2px solid rgba(255,255,255,0.7);
    border-radius: 50%;
    color: #333;
    font-weight: 500;
    cursor: pointer;
    user-select: none; -webkit-user-select: none;
    transition: transform 0.05s, background 0.1s;
  }
  .btn:active {
    transform: scale(0.92);
    background: rgba(255,255,255,0.6);
  }

  #btn-left  { left: 16px;  bottom: 16px; width: 70px; height: 70px; font-size: 26px; }
  #btn-right { left: 96px; bottom: 16px; width: 70px; height: 70px; font-size: 26px; }
  #btn-jump  {
    right: 16px; bottom: 16px; width: 84px; height: 84px; font-size: 20px;
    background: rgba(255,200,220,0.6);
    border-color: rgba(255,150,180,0.9);
    color: #8B3A5C;
  }
  #btn-jump:active { background: rgba(255,200,220,0.85); }
  #btn-attack {
    right: 112px; bottom: 28px; width: 64px; height: 64px; font-size: 14px;
    background: rgba(255,240,170,0.72);
    border-color: rgba(255,205,90,0.95);
    color: #7A5B00;
    flex-direction: column;
    line-height: 1.05;
    text-align: center;
    padding: 2px;
  }
  #btn-attack:active { background: rgba(255,240,170,0.9); }
  /* ルナモン：しっぽクールダウン中 */
  #btn-attack.attack-cooldown {
    background: rgba(168, 168, 178, 0.72);
    border-color: rgba(130, 130, 140, 0.9);
    color: #3a3a44;
    font-size: 10px;
  }
  #btn-attack.attack-cooldown:active {
    background: rgba(150, 150, 160, 0.85);
  }
  #btn-attack .atk-line1 {
    font-size: 9px;
    font-weight: 700;
  }
  #btn-attack .atk-cd {
    font-size: 12px;
    font-weight: 800;
    margin-top: 1px;
  }
  /* プニ：星弾0のとき */
  #btn-attack.attack-disabled {
    background: rgba(168, 168, 178, 0.62);
    border-color: rgba(130, 130, 140, 0.85);
    color: #4a4a55;
  }
  #btn-attack.attack-disabled:active {
    background: rgba(155, 155, 165, 0.78);
  }

  #message {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(255,255,255,0.95);
    padding: 20px 32px;
    border-radius: 16px;
    font-size: 18px; font-weight: 500;
    color: #333; text-align: center;
    display: none;
    white-space: pre-line;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    z-index: 20;
  }
  #clear-actions {
    position: absolute;
    top: calc(50% + 84px);
    left: 50%;
    transform: translateX(-50%);
    display: none;
    z-index: 21;
  }
  #btn-back-stage-select {
    border: 2px solid #c8b5ff;
    background: #efe7ff;
    color: #4a3a7d;
    border-radius: 12px;
    padding: 10px 16px;
    min-width: 190px;
    min-height: 44px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  #btn-back-stage-select:active {
    transform: scale(0.98);
  }

  #stage-select {
    position: absolute; inset: 0;
    background: rgba(20, 20, 30, 0.55);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 30;
  }
  #stage-select .panel {
    background: rgba(255,255,255,0.95);
    border-radius: 16px;
    padding: 18px;
    width: min(520px, 92vw);
    box-shadow: 0 4px 18px rgba(0,0,0,0.25);
    text-align: center;
  }
  #stage-select h2 {
    font-size: 22px;
    color: #444;
    margin-bottom: 6px;
  }
  #stage-select p {
    color: #666;
    font-size: 13px;
    margin-bottom: 14px;
  }
  #stage-select .row {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .stage-btn {
    border: 2px solid #c8b5ff;
    background: #efe7ff;
    color: #4a3a7d;
    border-radius: 12px;
    padding: 10px 14px;
    min-width: 180px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
  }
  .stage-btn:active { transform: scale(0.98); }
  .char-row {
    margin-top: 10px;
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .char-btn {
    border: 2px solid #d7d7e8;
    background: #f8f8ff;
    color: #444a69;
    border-radius: 999px;
    padding: 8px 14px;
    min-height: 44px;
    min-width: 120px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 700;
  }
  .char-btn.active {
    border-color: #8b88c6;
    background: #ecebff;
    color: #3a3772;
    box-shadow: 0 2px 10px rgba(93, 88, 158, 0.22);
  }
  .char-btn:active { transform: scale(0.98); }

  #game-over-panel {
    position: absolute; inset: 0;
    background: rgba(10, 8, 22, 0.72);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 35;
    flex-direction: column;
    gap: 14px;
    padding: 20px;
  }
  #game-over-panel .go-inner {
    background: rgba(255, 252, 248, 0.97);
    border-radius: 16px;
    padding: 22px 20px;
    width: min(400px, 90vw);
    box-shadow: 0 8px 32px rgba(0,0,0,0.35);
    text-align: center;
  }
  #game-over-panel h2 {
    margin: 0 0 8px;
    font-size: 22px;
    color: #3d2a5c;
  }
  #game-over-panel p {
    margin: 0 0 16px;
    font-size: 14px;
    color: #555;
    line-height: 1.45;
  }
  #game-over-panel .go-row {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .go-btn {
    border: 2px solid #8b7ab8;
    background: linear-gradient(180deg, #f0eaff, #e4dcff);
    color: #3a2f66;
    border-radius: 12px;
    padding: 12px 18px;
    min-height: 48px;
    min-width: 160px;
    cursor: pointer;
    font-size: 15px;
    font-weight: 700;
  }
  .go-btn:active { transform: scale(0.98); }
  .go-btn.secondary {
    border-color: #aaa;
    background: #f5f5f5;
    color: #444;
  }

  /* ゲーム中ポーズ（全画面オーバーレイ） */
  #pause-panel {
    position: absolute; inset: 0;
    background: rgba(12, 10, 28, 0.78);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 40;
    flex-direction: column;
    padding: 20px;
  }
  #pause-panel .pause-inner {
    background: rgba(255, 252, 250, 0.98);
    border-radius: 16px;
    padding: 22px 20px;
    width: min(400px, 90vw);
    box-shadow: 0 8px 28px rgba(0,0,0,0.38);
    text-align: center;
  }
  #pause-panel h2 {
    margin: 0 0 8px;
    font-size: 22px;
    color: #3d2a5c;
  }
  #pause-panel p {
    margin: 0 0 16px;
    font-size: 14px;
    color: #555;
    line-height: 1.45;
  }
  #pause-panel .pause-row {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }
  /* 画面上部のトップバー（絶対配置）と重ならないよう、ゲームエリア上端より下げる */
  #btn-pause-open {
    position: absolute;
    top: calc(46px + env(safe-area-inset-top, 0px));
    right: 10px;
    z-index: 12;
    width: 48px;
    height: 48px;
    min-width: 44px;
    min-height: 44px;
    border-radius: 12px;
    border: 2px solid rgba(255,255,255,0.8);
    background: rgba(255,255,255,0.5);
    color: #333;
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }
  #btn-pause-open:active {
    transform: scale(0.96);
    background: rgba(255,255,255,0.75);
  }

  #rotate-hint {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.85);
    color: #fff;
    display: none;
    align-items: center; justify-content: center;
    flex-direction: column;
    gap: 16px;
    font-size: 16px;
    z-index: 100;
    text-align: center;
    padding: 20px;
  }
  #rotate-hint .icon {
    font-size: 48px;
    animation: rotate 2s ease-in-out infinite;
  }
  @keyframes rotate {
    0%, 100% { transform: rotate(0deg); }
    50% { transform: rotate(90deg); }
  }

  @media (orientation: portrait) and (max-width: 900px) {
    #rotate-hint { display: flex; }
  }

  @media (max-width: 900px) {
    /* スマホでは操作UIを少し小さくして地面の視認性を上げる */
    #btn-left,
    #btn-right {
      width: 60px;
      height: 60px;
      font-size: 22px;
      bottom: calc(8px + env(safe-area-inset-bottom));
    }
    #btn-left { left: 10px; }
    #btn-right { left: 78px; }
    #btn-attack {
      width: 56px;
      height: 56px;
      font-size: 12px;
      right: 90px;
      bottom: calc(14px + env(safe-area-inset-bottom));
    }
    #btn-jump {
      width: 74px;
      height: 74px;
      font-size: 18px;
      right: 10px;
      bottom: calc(8px + env(safe-area-inset-bottom));
    }
    #btn-pause-open {
      top: calc(44px + env(safe-area-inset-top, 0px));
    }
  }
</style>
</head>
<body>

<div id="wrapper">

  <div id="top-bar">
    <span id="status">ルナモン冒険中</span>
    <span id="score">💎 0 / 5</span>
    <span id="lives">❤️ 3</span>
  </div>

  <div id="game-container">
    <canvas id="game"></canvas>

    <div id="stage-select">
      <div class="panel">
        <h2>ステージをえらんでね</h2>
        <p>ステージ2は敵が増えて足場も厳しめです / ステージ3は砂漠です / ステージ4はボス戦です</p>
        <div class="row">
          <button id="stage1-btn" class="stage-btn">ステージ1（ノーマル）</button>
          <button id="stage2-btn" class="stage-btn">ステージ2（ハード）</button>
          <button id="stage3-btn" class="stage-btn">ステージ3（砂漠）</button>
          <button id="stage4-btn" class="stage-btn">ステージ4（ボス：トレットン）</button>
        </div>
        <div class="char-row">
          <button id="char-puni-btn" class="char-btn">キャラ: プニ</button>
          <button id="char-lunamon-btn" class="char-btn active">キャラ: ルナモン</button>
        </div>
      </div>
    </div>

    <div id="btn-left" class="btn">◀</div>
    <div id="btn-right" class="btn">▶</div>
    <div id="btn-attack" class="btn">ATTACK</div>
    <div id="btn-jump" class="btn">JUMP</div>

    <div id="message"></div>
    <div id="clear-actions">
      <button id="btn-back-stage-select">ステージ選択へ戻る</button>
    </div>

    <div id="game-over-panel">
      <div class="go-inner">
        <h2>ゲームオーバー</h2>
        <p>どうする？</p>
        <div class="go-row">
          <button type="button" id="btn-go-retry" class="go-btn">やり直す</button>
          <button type="button" id="btn-go-stage" class="go-btn secondary">ステージ選択へ</button>
        </div>
      </div>
    </div>

    <button type="button" id="btn-pause-open" aria-label="一時停止">Ⅱ</button>

    <div id="pause-panel">
      <div class="pause-inner">
        <h2>ポーズ</h2>
        <p>つづけるか、ステージせんたくに戻るかをえらんでね</p>
        <div class="pause-row">
          <button type="button" id="btn-pause-resume" class="go-btn">つづける</button>
          <button type="button" id="btn-pause-stage" class="go-btn secondary">ステージ選択へ</button>
        </div>
      </div>
    </div>
  </div>

  <div id="rotate-hint">
    <div class="icon">📱</div>
    <div>端末を横向きにしてね</div>
  </div>

</div>

<script>
(function() {
  'use strict';

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const statusEl = document.getElementById('status');
  const scoreEl = document.getElementById('score');
  const livesEl = document.getElementById('lives');
  const messageEl = document.getElementById('message');
  const clearActionsEl = document.getElementById('clear-actions');
  const backStageSelectBtn = document.getElementById('btn-back-stage-select');
  const gameOverPanelEl = document.getElementById('game-over-panel');
  const gameOverRetryBtn = document.getElementById('btn-go-retry');
  const gameOverStageBtn = document.getElementById('btn-go-stage');
  const stageSelectEl = document.getElementById('stage-select');
  const stage1Btn = document.getElementById('stage1-btn');
  const stage2Btn = document.getElementById('stage2-btn');
  const stage3Btn = document.getElementById('stage3-btn');
  const stage4Btn = document.getElementById('stage4-btn');
  const charPuniBtn = document.getElementById('char-puni-btn');
  const charLunamonBtn = document.getElementById('char-lunamon-btn');
  const pausePanelEl = document.getElementById('pause-panel');
  const pauseOpenBtn = document.getElementById('btn-pause-open');
  const pauseResumeBtn = document.getElementById('btn-pause-resume');
  const pauseStageBtn = document.getElementById('btn-pause-stage');
  const attackBtn = document.getElementById('btn-attack');

  // ============================================
  // 定数・設定
  // ============================================
  const W = 800;   // 論理解像度・幅
  const H = 450;   // 論理解像度・高さ（16:9）

  const GRAVITY       = 0.5;
  const FLOAT_GRAVITY = 0.15;  // ジャンプボタン長押し中の重力（ふわっと感）
  const JUMP_POWER    = -11;
  const MOVE_SPEED    = 3.5;
  const MAX_FALL      = 12;
  const FRICTION      = 0.8;

  const WORLD_WIDTH = 1600;

  // Canvas解像度設定（Retina対応）
  function resizeCanvas() {
    const rect = canvas.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width  = W * dpr;
    canvas.height = H * dpr;
    ctx.scale(dpr, dpr);
    // 実際のCSSピクセルは常にW x H相当で描画する
  }
  // 論理座標で描画するため、Canvas内部解像度はWxH固定でOK
  canvas.width  = W;
  canvas.height = H;

  // ============================================
  // ゲーム状態
  // ============================================
  const player = {
    x: 80, y: 200,
    vx: 0, vy: 0,
    r: 20,
    onGround: false,
    facing: 1,      // 1 = 右, -1 = 左
    floating: false,
    eyeBlink: 0,
    squish: 0       // ジャンプ・着地時の潰れ演出用（-1〜1）
  };

  function createStage1() {
    return {
      worldWidth: 1600,
      holes: [],
      platforms: [
        {x: 0,    y: 420, w: 1600, h: 30},
        {x: 200,  y: 340, w: 100, h: 20},
        {x: 360,  y: 280, w: 100, h: 20},
        {x: 520,  y: 220, w: 100, h: 20},
        {x: 700,  y: 320, w: 120, h: 20},
        {x: 900,  y: 260, w: 100, h: 20},
        {x: 1100, y: 320, w: 150, h: 20},
        {x: 1350, y: 260, w: 100, h: 20}
      ],
      stars: [
        {x: 120,  y: 390, collected: false},
        {x: 410,  y: 236, collected: false},
        {x: 760,  y: 388, collected: false},
        {x: 960,  y: 168, collected: false},
        {x: 1410, y: 214, collected: false}
      ],
      lifeItem: {x: 170, y: 390, collected: false},
      goal: {x: 1500, y: 380, w: 40, h: 40},
      enemies: [
        {x: 320, y: 400, w: 36, h: 20, minX: 260, maxX: 420, speed: 1.4, dir: 1},
        {x: 860, y: 240, w: 36, h: 20, minX: 820, maxX: 980, speed: 1.2, dir: -1},
        {x: 1250, y: 300, w: 36, h: 20, minX: 1160, maxX: 1360, speed: 1.6, dir: 1}
      ],
      hammerEnemies: []
    };
  }

  function createStage2() {
    return {
      worldWidth: 2000,
      theme: 'normal',
      holes: [
        {x: 280, w: 70},
        {x: 620, w: 90},
        {x: 980, w: 80},
        {x: 1380, w: 100},
        {x: 1730, w: 90}
      ],
      platforms: [
        // 地面に穴を作るため、地面を分割して配置
        {x: 0,    y: 420, w: 280, h: 30},
        {x: 350,  y: 420, w: 270, h: 30},
        {x: 710,  y: 420, w: 270, h: 30},
        {x: 1060, y: 420, w: 320, h: 30},
        {x: 1480, y: 420, w: 250, h: 30},
        {x: 1820, y: 420, w: 180, h: 30},
        {x: 130,  y: 368, w: 68, h: 18},
        {x: 245,  y: 320, w: 62, h: 18},
        {x: 350,  y: 270, w: 62, h: 18},
        {x: 460,  y: 232, w: 58, h: 18},
        {x: 565,  y: 305, w: 62, h: 18},
        {x: 675,  y: 258, w: 60, h: 18},
        {x: 785,  y: 216, w: 62, h: 18},
        {x: 900,  y: 286, w: 62, h: 18},
        {x: 1010, y: 246, w: 58, h: 18},
        {x: 1120, y: 206, w: 60, h: 18},

        {x: 1820, y: 292, w: 64, h: 18}
      ],
      stars: [
        {x: 90,   y: 390, collected: false},
        {x: 498,  y: 186, collected: false},
        {x: 930,  y: 388, collected: false},
        {x: 1148, y: 162, collected: false},
        {x: 1760, y: 184, collected: false}
      ],
      lifeItem: {x: 190, y: 390, collected: false},
      goal: {x: 1930, y: 380, w: 40, h: 40},
      enemies: [
        {x: 220,  y: 400, w: 36, h: 20, minX: 140,  maxX: 360,  speed: 2.2, dir: 1},
        {x: 610,  y: 400, w: 36, h: 20, minX: 520,  maxX: 780,  speed: 2.35, dir: -1},
        {x: 980,  y: 400, w: 36, h: 20, minX: 900,  maxX: 1140, speed: 2.3, dir: 1},
        {x: 1330, y: 400, w: 36, h: 20, minX: 1240, maxX: 1490, speed: 2.45, dir: -1},
        {x: 1700, y: 400, w: 36, h: 20, minX: 1620, maxX: 1880, speed: 2.5, dir: 1},
        {x: 520,  y: 212, w: 36, h: 20, minX: 450,  maxX: 640,  speed: 2.15, dir: -1},
        {x: 1060, y: 188, w: 36, h: 20, minX: 980,  maxX: 1220, speed: 2.25, dir: 1},
        {x: 1560, y: 210, w: 36, h: 20, minX: 1470, maxX: 1760, speed: 2.3, dir: -1}
      ],
      hammerEnemies: [
        {x: 760, y: 400, w: 34, h: 34, minX: 700, maxX: 910, speed: 1.8, dir: -1, vx: 0, vy: 0, onGround: true, jumpCooldown: 0, throwCooldown: 0, justLanded: false},
        {x: 1460, y: 400, w: 34, h: 34, minX: 1380, maxX: 1620, speed: 1.9, dir: 1, vx: 0, vy: 0, onGround: true, jumpCooldown: 25, throwCooldown: 0, justLanded: false}
      ],
      skyDropEnemies: [],
      skyDrops: [],
      oasis: null
    };
  }

  function createStage3() {
    return {
      worldWidth: 3400,
      theme: 'desert',

  function initVoicePlayers() {

  // 別種類のボイスが重ならないよう、同一スキン内で exceptType 以外を停止する
  function stopOtherVoicePlayers(skin, exceptType) {
    const bucket = audio.voicePlayers[skin];
    if (!bucket) return;
    for (const key of Object.keys(bucket)) {
      if (key === exceptType) continue;
      const el = bucket[key];
      if (!el) continue;
      try {
        el.pause();
        el.currentTime = 0;
      } catch (_e) {
        // 無視（読み込み失敗時など）
      }
    }
  }

  function playVoice(type) {
    // 初回が攻撃など playSe より先に来る場合でも Audio を用意する
    initVoicePlayers();
    // スキンごとに別インスタンスなので、再生URLがプニとルナモンで混ざらない
    const skin = playerSkin === 'lunamon' ? 'lunamon' : 'puni';
    const player = audio.voicePlayers[skin][type];
    if (!player) return false;

    const nowMs = performance.now();
    const cooldownMs =
      type === 'jump' ? 5000 :
      type === 'fanfare' ? 800 :
      type === 'fall' ? 300 :
      type === 'attack' ? 420 :
      120;
    const lastPlayedAt = audio.voiceLastPlayedAt[type] || 0;
    if (nowMs - lastPlayedAt < cooldownMs) return true;

    // 同じ種類のボイスだけは重複再生しない
    if (!player.paused && !player.ended) {
      return true;
    }

    // 再生中の別種類ボイスを止めてから、今回の種類だけ鳴らす
    stopOtherVoicePlayers(skin, type);

    try {
      player.currentTime = 0;
      const promise = player.play();
      if (promise && typeof promise.catch === 'function') {
        promise.catch(() => {});
      }
      audio.voiceLastPlayedAt[type] = nowMs;
      return true;
    } catch (_err) {
      return false;
    }
  }

  function ensureAudioContext() {
    initVoicePlayers();
    if (!audio.ctx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (AC) audio.ctx = new AC();
    }
    if (audio.ctx && audio.ctx.state === 'suspended') {
      audio.ctx.resume().catch(() => {});
    }
    startBgmIfNeeded();
  }

  function playBgmTone(freq, startTime, duration, type, volume) {
    if (!audio.ctx) return;
    const osc = audio.ctx.createOscillator();
    const gain = audio.ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, startTime);
    gain.gain.setValueAtTime(0.0001, startTime);
    gain.gain.exponentialRampToValueAtTime(
      volume * BGM_MASTER_VOLUME * BGM_TONE_GAIN_MULT,
      startTime + 0.02
    );
    gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);
    osc.connect(gain);
    gain.connect(audio.ctx.destination);
    osc.start(startTime);
    osc.stop(startTime + duration + 0.02);
  }

  function stopBossFileBgm() {
    const el = audio.bossBgmAudio;

  function startBossFileBgm() {
    if (audio.bgmTimer) {
      window.clearTimeout(audio.bgmTimer);
      audio.bgmTimer = null;
    }
    if (!audio.bossBgmAudio) {
      const el = new Audio(BGM_BOSS_SRC);
      el.loop = true;
      el.volume = BOSS_BGM_VOLUME;
      el.addEventListener('error', () => {
        console.error('ボスBGMの読み込みに失敗しました');
      });
      audio.bossBgmAudio = el;
    }
    const el = audio.bossBgmAudio;
    el.volume = BOSS_BGM_VOLUME;
    el.currentTime = 0;
    el.play().catch(() => {});
  }

    }
    audio.bgmStep = 0;

  function pauseGameplayAudio() {
    if (audio.bgmTimer) {
      window.clearTimeout(audio.bgmTimer);
      audio.bgmTimer = null;
    }
    const boss = audio.bossBgmAudio;
    if (boss && !boss.paused) {
      try {
        boss.pause();
      } catch (_e) {
        // 無視
      }
    }
    if (audio.ctx && audio.ctx.state === 'running') {
      audio.ctx.suspend().catch(() => {});
    }
  }

  /** 再開時：Web Audio を起こし、BGM を再スケジュールまたはボス MP3 を再生 */
  function resumeGameplayAudio() {
    if (audio.ctx && audio.ctx.state === 'suspended') {
      audio.ctx.resume().catch(() => {});
    }
    if (!audio.bgmStarted) return;
    if (audio.bgmVariant === 'boss') {
      const boss = audio.bossBgmAudio;
      if (boss) boss.play().catch(() => {});
      return;
    }
    // プロシージャル BGM：次ループの setTimeout が生きている＝既に 1 パターン分スケジュール済み。
    // 無条件で schedule すると、直後の loadStage.restart や二重 resume と同時刻に和音が二重になる。
    if (audio.ctx && gameStarted && !audio.bgmTimer) {
      scheduleBgmPattern();
    }
  }

  function syncPauseOpenButtonVisibility() {
    pauseOpenBtn.style.display =
      gameStarted && !gameOverMenuActive ? 'flex' : 'none';
  }

  function openPauseMenu() {
    if (!gameStarted || gameOverMenuActive || gamePaused) return;
    gamePaused = true;
    input.left = input.right = input.jump = input.attack = false;
    input.jumpPressed = input.attackPressed = false;
    pausePanelEl.style.display = 'flex';
    pauseGameplayAudio();
  }

  function closePauseResumeGame() {
    if (!gamePaused) return;
    gamePaused = false;
    pausePanelEl.style.display = 'none';
    resumeGameplayAudio();
  }

  function togglePauseMenu() {
    if (!gameStarted || gameOverMenuActive) return;
    if (gamePaused) closePauseResumeGame();
    else openPauseMenu();
  }

  /** ステージ選択画面へ戻す共通処理（クリア／ゲームオーバー／ポーズから） */
  function returnToStageSelectScreen() {
    gamePaused = false;
    pausePanelEl.style.display = 'none';
    if (audio.bgmTimer) {
      window.clearTimeout(audio.bgmTimer);
      audio.bgmTimer = null;
    }
    stopBossFileBgm();
    audio.ctx?.resume().catch(() => {});
    gameStarted = false;
    gameOverMenuActive = false;
    gameOverPanelEl.style.display = 'none';
    currentStageName = '';
    currentStageId = '';
    updateStatusLabel();
    stageSelectEl.style.display = 'flex';
    messageEl.style.display = 'none';
    clearActionsEl.style.display = 'none';
    syncPauseOpenButtonVisibility();
  }

  function scheduleBgmPattern() {
    if (!audio.ctx || !audio.bgmStarted) return;
    // ボス戦はファイル BGM（startBossFileBgm）のため Web Audio ループは張らない
    if (audio.bgmVariant === 'boss') {
      if (audio.bgmTimer) {
        window.clearTimeout(audio.bgmTimer);
        audio.bgmTimer = null;
      }
      return;
    }
    const now = audio.ctx.currentTime;
    const isStage2 = audio.bgmVariant === 'stage2';
    const isDesert = audio.bgmVariant === 'desert';
    const stepDuration = isDesert ? 0.48 : (isStage2 ? 0.42 : 0.45);
    let startTime = now + 0.03;

    // 穏やかで軽いポップ感のある4コード進行を8ステップで回す
    const chordsArray = isDesert ? ARABIAN_CHORDS : BGM_CHORDS;
    const bassArray = isDesert ? ARABIAN_BASS : BGM_BASS;

    for (let i = 0; i < 8; i++) {
      const step = (audio.bgmStep + i) % 8;
      const chordIndex = Math.floor(step / 2) % chordsArray.length;
      const chord = chordsArray[chordIndex];
      const bass = bassArray[chordIndex];

      if (isDesert) {
        // 砂漠っぽい：ドローン低音＋弦っぽい中域
        playBgmTone(bass, startTime, stepDuration * 0.98, 'sine', 0.048);
        playBgmTone(chord[0], startTime, stepDuration * 0.92, 'triangle', 0.018);
        playBgmTone(chord[1], startTime, stepDuration * 0.82, 'triangle', 0.014);
      } else {
        playBgmTone(bass, startTime, stepDuration * 0.95, 'sine', isStage2 ? 0.042 : 0.035);
        playBgmTone(chord[0], startTime, stepDuration * 0.85, 'triangle', isStage2 ? 0.022 : 0.018);
        playBgmTone(chord[1], startTime, stepDuration * 0.85, 'triangle', isStage2 ? 0.017 : 0.014);
      }

      // 偶数拍に軽いメロディを重ねる
      if (step % 2 === 0) {
        playBgmTone(chord[2], startTime + 0.12, stepDuration * 0.4, isDesert ? 'sine' : 'square', isDesert ? 0.011 : (isStage2 ? 0.012 : 0.01));
      }

      // ステージ2は音をリッチに（パッド＋アルペジオを追加）
      if (isStage2) {
        // パッド（1オクターブ上を薄く伸ばす）
        playBgmTone(chord[0] * 2, startTime, stepDuration * 0.98, 'sine', 0.009);
        playBgmTone(chord[1] * 2, startTime, stepDuration * 0.98, 'sine', 0.007);

        // アルペジオ（8分で回す）
        const arpNote = chord[(step + chordIndex) % 3] * 2;
        playBgmTone(arpNote, startTime + 0.06, stepDuration * 0.35, 'triangle', 0.014);
      }

      // 砂漠はアラビア風の装飾フレーズ＋乾いたパーカッション
      if (isDesert) {
        // アラビア和音に寄せた装飾音（Hz）
        const leadScale = [261.63, 277.18, 293.66, 329.63, 349.23, 392.0, 415.3, 440.0];
        const leadA = leadScale[(step + chordIndex) % leadScale.length];
        const leadB = leadScale[(step + chordIndex + 2) % leadScale.length];
        playBgmTone(leadA, startTime + 0.08, stepDuration * 0.28, 'sine', 0.016);
        playBgmTone(leadB, startTime + 0.22, stepDuration * 0.24, 'sine', 0.014);

        // darbuka風の低音/高音ヒット
        playBgmTone(130, startTime + 0.01, 0.035, 'square', 0.012);
        playBgmTone(820, startTime + 0.13, 0.02, 'triangle', 0.008);
        if (step % 2 === 1) {
          playBgmTone(760, startTime + 0.29, 0.018, 'triangle', 0.007);
        }
      }

      startTime += stepDuration;
    }

    audio.bgmStep = (audio.bgmStep + 8) % 8;
    audio.bgmTimer = window.setTimeout(scheduleBgmPattern, stepDuration * 8 * 1000 - 80);
  }

  function startBgmIfNeeded() {
    if (audio.bgmStarted) return;
    audio.bgmStarted = true;
    if (audio.bgmVariant === 'boss') {
      startBossFileBgm();
      return;
    }
    if (!audio.ctx) return;
    scheduleBgmPattern();
  }

  /** 短いホワイトノイズ用バッファを生成する */
  function createShortNoiseBuffer(ctx, seconds) {
    const len = Math.max(1, Math.floor(ctx.sampleRate * seconds));
    const buf = ctx.createBuffer(1, len, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) {
      d[i] = (Math.random() * 2 - 1) * 0.5;
    }
    return buf;
  }

  /** 帯域を絞ったノイズバースト（葉擦れ・風切り） */
  function playBandNoiseBurst(ctx, t0, dur, centerHz, q, peakGain) {
    const buf = createShortNoiseBuffer(ctx, dur + 0.04);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const bp = ctx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.setValueAtTime(centerHz, t0);
    bp.frequency.exponentialRampToValueAtTime(
      Math.min(centerHz * 1.45, ctx.sampleRate * 0.45),
      t0 + dur * 0.55
    );
    bp.Q.value = q;
    const g = ctx.createGain();
    const g0 = Math.max(0.0002, peakGain);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(g0, t0 + Math.min(0.012, dur * 0.25));
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    src.connect(bp);
    bp.connect(g);
    g.connect(audio.seOutput);
    src.start(t0);
    src.stop(t0 + dur + 0.05);
  }

  /** ローパスでノイズを通したスウィープ（空気の塊・投擲の風） */
  function playLowpassNoiseSweep(ctx, t0, dur, fHi, fLo, peakGain) {
    const buf = createShortNoiseBuffer(ctx, dur + 0.04);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const lp = ctx.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.setValueAtTime(fHi, t0);
    lp.frequency.exponentialRampToValueAtTime(Math.max(80, fLo), t0 + dur * 0.88);
    const g = ctx.createGain();
    const g0 = Math.max(0.0002, peakGain);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(g0, t0 + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    src.connect(lp);
    lp.connect(g);
    g.connect(audio.seOutput);
    src.start(t0);
    src.stop(t0 + dur + 0.05);
  }

  /** 幹前強風で押し戻されたときの突風 SE */
  function playBossGustWindSe(ctx, t0) {
    // ボス戦 BGM 下げとセットで、合成レイヤだけ内部も持ち上げる
    const wm = bossSefxBk();
    playLowpassNoiseSweep(ctx, t0, 0.19, 5600, 160, 0.062 * wm);
    playBandNoiseBurst(ctx, t0, 0.11, 620, 0.42, 0.048 * wm);
    playBandNoiseBurst(ctx, t0 + 0.035, 0.1, 1500, 0.55, 0.04 * wm);

    const rumble = ctx.createOscillator();
    const gR = ctx.createGain();
    rumble.type = 'sine';
    rumble.frequency.setValueAtTime(52, t0);
    rumble.frequency.exponentialRampToValueAtTime(34, t0 + 0.16);
    gR.gain.setValueAtTime(0.0001, t0);
    gR.gain.exponentialRampToValueAtTime(0.078 * wm, t0 + 0.035);
    gR.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.22);
    rumble.connect(gR);
    gR.connect(audio.seOutput);
    rumble.start(t0);
    rumble.stop(t0 + 0.24);

    const gust = ctx.createOscillator();
    const gG = ctx.createGain();
    gust.type = 'triangle';
    gust.frequency.setValueAtTime(120, t0 + 0.02);
    gust.frequency.exponentialRampToValueAtTime(880, t0 + 0.14);
    gG.gain.setValueAtTime(0.0001, t0 + 0.02);
    gG.gain.exponentialRampToValueAtTime(0.055 * wm, t0 + 0.045);
    gG.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.18);
    gust.connect(gG);
    gG.connect(audio.seOutput);
    gust.start(t0 + 0.02);
    gust.stop(t0 + 0.2);
  }

  /**
   * 敵に星弾・しっぽが当たって撃破されたときの合成 SE（ボイス enemyDefeat と重ねる）
   * キラ星＋柔らかい胴体音＋きらめきノイズのファンタジー調
   * （BGM やボイスに埋もれないようゲインをやや強め）
   */
  function playEnemyHitSe(ctx, t0, ampExtra = 1) {
    const amp = 2.45 * ampExtra;
    const sparkle = [1046.5, 1318.51, 1567.98];
    for (let i = 0; i < sparkle.length; i++) {
      const t = t0 + i * 0.026;
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(sparkle[i], t);
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.052 * amp, t + 0.004);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.085);
      o.connect(g);
      g.connect(audio.seOutput);
      o.start(t);
      o.stop(t + 0.09);
    }

    const body = ctx.createOscillator();
    const gB = ctx.createGain();
    body.type = 'triangle';
    body.frequency.setValueAtTime(460, t0 + 0.018);
    body.frequency.exponentialRampToValueAtTime(125, t0 + 0.11);
    gB.gain.setValueAtTime(0.0001, t0 + 0.018);
    gB.gain.exponentialRampToValueAtTime(0.085 * amp, t0 + 0.032);
    gB.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.15);
    body.connect(gB);
    gB.connect(audio.seOutput);
    body.start(t0 + 0.018);
    body.stop(t0 + 0.16);

    playBandNoiseBurst(ctx, t0 + 0.035, 0.075, 4800, 2.4, 0.024 * amp);
    playLowpassNoiseSweep(ctx, t0 + 0.045, 0.09, 3600, 180, 0.03 * amp);

    const thud = ctx.createOscillator();
    const gT = ctx.createGain();
    thud.type = 'sine';
    thud.frequency.setValueAtTime(92, t0 + 0.055);
    thud.frequency.exponentialRampToValueAtTime(38, t0 + 0.13);
    gT.gain.setValueAtTime(0.0001, t0 + 0.055);
    gT.gain.exponentialRampToValueAtTime(0.068 * amp, t0 + 0.07);
    gT.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.17);
    thud.connect(gT);
    gT.connect(audio.seOutput);
    thud.start(t0 + 0.055);
    thud.stop(t0 + 0.18);

    const ring = ctx.createOscillator();
    const gR = ctx.createGain();
    ring.type = 'triangle';
    ring.frequency.setValueAtTime(1980, t0 + 0.02);
    ring.frequency.exponentialRampToValueAtTime(6600, t0 + 0.045);
    gR.gain.setValueAtTime(0.0001, t0 + 0.02);
    gR.gain.exponentialRampToValueAtTime(0.022 * amp, t0 + 0.028);
    gR.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.07);
    ring.connect(gR);
    gR.connect(audio.seOutput);
    ring.start(t0 + 0.02);
    ring.stop(t0 + 0.075);
  }

  /**
   * ボスがダメージを受けたとき（撃破以外）
   * 重い幹に食い込むドン寄り（しっぽ攻撃の「風切り＋上昇音」とは音色を分ける）
   */
  function playBossTakeDamageSe(ctx, t0) {
    const out = audio.seOutput;
    if (!out) return;
    const m = bossSefxBk();

    const thud = ctx.createOscillator();
    const gT = ctx.createGain();
    thud.type = 'sine';
    thud.frequency.setValueAtTime(76, t0);
    thud.frequency.exponentialRampToValueAtTime(32, t0 + 0.2);
    gT.gain.setValueAtTime(0.0001, t0);
    // 低音が BGM に埋もれにくいようピークをやや強め（クリック注意）
    gT.gain.exponentialRampToValueAtTime(0.3 * m, t0 + 0.014);
    gT.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.24);
    thud.connect(gT);
    gT.connect(out);
    thud.start(t0);
    thud.stop(t0 + 0.26);

    const wood = ctx.createOscillator();
    const gW = ctx.createGain();
    wood.type = 'triangle';
    wood.frequency.setValueAtTime(112, t0 + 0.005);
    wood.frequency.exponentialRampToValueAtTime(52, t0 + 0.15);
    gW.gain.setValueAtTime(0.0001, t0 + 0.005);
    gW.gain.exponentialRampToValueAtTime(0.11 * m, t0 + 0.022);
    gW.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.18);
    wood.connect(gW);
    gW.connect(out);
    wood.start(t0 + 0.005);
    wood.stop(t0 + 0.19);

    // 高域のキラ音は付けず、低〜中域のざらりだけ
    playBandNoiseBurst(ctx, t0 + 0.012, 0.085, 380, 0.5, 0.048 * m);
    playBandNoiseBurst(ctx, t0 + 0.035, 0.07, 220, 0.38, 0.038 * m);
    playLowpassNoiseSweep(ctx, t0 + 0.018, 0.12, 480, 85, 0.03 * m);
  }

  /** ボス：葉攻撃 — 多層の擦れ音＋刃の抜け＋高域の切れ＋ザシュッとした刃風 */

  /**
   * ゲームクリア用ファンファーレ（Web Audio）
   * ボイス clear.wav と重ねても破綻しないよう、中高音域を中心に層を厚くする。
   */
  function playGameClearFanfareSe(ctx, t0) {
    const out = audio.seOutput;
    if (!out) return;

    // 和音1ブロック（各音を独立エンベロープ）
    function chordBlock(freqs, t, dur, peak, types) {
      for (let i = 0; i < freqs.length; i++) {
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.type = types && types[i] ? types[i] : (i === 0 ? 'triangle' : 'sine');
        o.frequency.setValueAtTime(freqs[i], t);
        g.gain.setValueAtTime(0.0001, t);
        g.gain.exponentialRampToValueAtTime(
          peak * (0.42 + i * 0.07),
          t + 0.028
        );
        g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
        o.connect(g);
        g.connect(out);
        o.start(t);
        o.stop(t + dur + 0.03);
      }
    }

    // 導入：低めの C メジャー → 明るい上層
    chordBlock(
      [130.81, 196.0, 261.63, 329.63],
      t0,
      0.36,
      0.085,
      ['triangle', 'sine', 'sine', 'triangle']
    );
    chordBlock(
      [523.25, 659.25, 783.99, 987.77],
      t0 + 0.04,
      0.34,
      0.055,
      ['triangle', 'triangle', 'sine', 'sine']
    );

    // 上昇アルペジオ（勝利の階段）
    const arp = [523.25, 587.33, 659.25, 698.46, 783.99, 880.0, 987.77, 1046.5];
    for (let i = 0; i < arp.length; i++) {
      const t = t0 + 0.11 + i * 0.075;
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'triangle';
      o.frequency.setValueAtTime(arp[i], t);
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.068, t + 0.014);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.12);
      o.connect(g);
      g.connect(out);
      o.start(t);
      o.stop(t + 0.14);
    }

    // 中間アクセント（短いファンファーレ型の四度跳躍感）
    chordBlock([392.0, 523.25, 659.25], t0 + 0.78, 0.22, 0.06, ['sine', 'triangle', 'triangle']);

    // 終止：長めの輝きコード＋ハイシャイン
    const tBig = t0 + 1.02;
    chordBlock(
      [261.63, 329.63, 392.0, 523.25, 659.25, 783.99, 1046.5],
      tBig,
      1.05,
      0.038,
      ['triangle', 'sine', 'sine', 'triangle', 'sine', 'triangle', 'sine']
    );
    for (let k = 0; k < 6; k++) {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(1318.51 + k * 55, tBig + k * 0.035);
      g.gain.setValueAtTime(0.0001, tBig + k * 0.035);
      g.gain.exponentialRampToValueAtTime(0.022, tBig + k * 0.035 + 0.018);
      g.gain.exponentialRampToValueAtTime(0.0001, tBig + 0.72);
      o.connect(g);
      g.connect(out);
      o.start(tBig + k * 0.035);
      o.stop(tBig + 0.78);
    }
  }

  /** ボイスと紐づかないボス専用SE（出現演出・攻撃ヒット音など。ボイスは鳴らさない） */
  const BOSS_SE_NO_VOICE = new Set([
    'bossGustWind',
    'bossAtkApple',
    'bossAtkLeaf',
    'bossAtkBranch',
    'bossWuApple',
    'bossWuLeaf',
    'bossWuBranch',
    'bossWuBranchWarn',
    'bossHitApple',
    'bossHitLeaf',
    'bossHitRoot',
    'bossTakeDamage',
    'bossStarClang',
    // アイテム「出現」時の合成のみ（回収時は playSe('star'|'life') でボイス付き）
    'bossItemStar',
    'bossItemHeal',
  ]);

  function playSe(type) {
    ensureAudioContext();

    // 合成専用SEではボイスを掛けない（ジャンプ・星など通常SEはボス戦でもボイス再生）
    const skipVoice =
      type === 'tailSwipe' ||
      type === 'enemyVanishTick' ||
      BOSS_SE_NO_VOICE.has(type);
    if (!skipVoice) {
      playVoice(type);
    }

    if (!audio.ctx) return;
    const ctx = audio.ctx;
    // suspended 直後は同時刻スケジュールだと鳴らない環境があるため resume して少し先に載せる
    if (ctx.state !== 'running') {
      ctx.resume().catch(() => {});
    }
    // suspended→running が非同期のとき、同フレームの 0.03 だと鳴らないことがあるため長めに取る
    const padSec = ctx.state === 'running' ? 0.04 : 0.16;
    const now = ctx.currentTime + padSec;
    if (!audio.seOutput) {
      const sm = ctx.createGain();
      sm.connect(ctx.destination);
      audio.seOutput = sm;
    }
    // ボス戦では BGM が大きいので合成 SE マスターを持ち上げる（毎回同期）
    audio.seOutput.gain.value = SE_GAIN_MULT * bossSefxBk();

    if (type === 'bossStarClang') {
      playBossStarClangSe(ctx, now);
      return;
    }
    if (type === 'bossGustWind') {
      playBossGustWindSe(ctx, now);
      return;
    }
    if (type === 'enemyDefeat') {
      const bossExtra = currentStageId === 'stage4' ? 1.75 : 1;
      playEnemyHitSe(ctx, now, bossExtra);
      if (currentStageId === 'stage4') {
        playEnemyHitBossAccent(ctx, now + 0.018);
      }
      return;
    }
    if (type === 'enemyVanishTick') {
      playEnemyVanishTickSe(ctx, now);
      return;
    }
    if (type === 'tailSwipe') {
      playTailSwipeSe(ctx, now);
      return;
    }
    if (type === 'bossAtkApple') {
      playBossAppleAtkSe(ctx, now);
      return;
    }
    if (type === 'bossAtkLeaf') {
      playBossLeafAtkSe(ctx, now);
      return;
    }
    if (type === 'bossWuApple') {
      playBossWuAppleSe(ctx, now);
      return;
    }
    if (type === 'bossWuLeaf') {
      playBossWuLeafSe(ctx, now);
      return;
    }
    if (type === 'bossWuBranch') {
      playBossWuBranchSe(ctx, now);
      return;
    }
    if (type === 'bossWuBranchWarn') {
      playBossWuBranchWarnSe(ctx, now);
      return;
    }
    if (type === 'bossHitApple') {
      playBossHitAppleSe(ctx, now);
      return;
    }
    if (type === 'bossHitLeaf') {
      playBossHitLeafSe(ctx, now);
      return;
    }
    if (type === 'bossTakeDamage') {
      playBossTakeDamageSe(ctx, now);
      return;
    }
    if (type === 'fanfare') {
      playGameClearFanfareSe(ctx, now);
      return;
    }

    const osc = audio.ctx.createOscillator();
    const gain = audio.ctx.createGain();
    osc.connect(gain);
    gain.connect(audio.seOutput);

    if (type === 'jump') {
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(320, now);
      osc.frequency.exponentialRampToValueAtTime(460, now + 0.08);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.1, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.12);
      osc.start(now);
      osc.stop(now + 0.12);
      return;
    }

    if (type === 'star') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(740, now);
      osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.09, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.14);
      osc.start(now);
      osc.stop(now + 0.14);
      return;
    }

    if (type === 'life') {
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(540, now);
      osc.frequency.exponentialRampToValueAtTime(980, now + 0.12);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.1, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.16);
      osc.start(now);
      osc.stop(now + 0.16);
      return;
    }

    if (type === 'enemy') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(240, now);
      osc.frequency.exponentialRampToValueAtTime(100, now + 0.16);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.12, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);
      osc.start(now);
      osc.stop(now + 0.18);
      return;
    }

    if (type === 'fall') {
      // 落下時は低めの「ドスン」を重ねて着地失敗の手触りを強める
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(140, now);
      osc.frequency.exponentialRampToValueAtTime(70, now + 0.14);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.14, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);
      osc.start(now);
      osc.stop(now + 0.18);
      return;
    }

    if (type === 'sandStep') {
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(180, now);
      osc.frequency.exponentialRampToValueAtTime(120, now + 0.08);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.02, now + 0.008);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.1);
      osc.start(now);
      osc.stop(now + 0.1);

      // 砂粒っぽいノイズ感を短く重ねる
      const noise = audio.ctx.createOscillator();
      const noiseGain = audio.ctx.createGain();
      noise.type = 'square';
      noise.frequency.setValueAtTime(860, now);
      noise.frequency.exponentialRampToValueAtTime(430, now + 0.06);
      noiseGain.gain.setValueAtTime(0.0001, now);
      noiseGain.gain.exponentialRampToValueAtTime(0.004, now + 0.005);
      noiseGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.07);
      noise.connect(noiseGain);
      noiseGain.connect(audio.seOutput);
      noise.start(now);
      noise.stop(now + 0.07);
      return;
    }

    // --- ボス戦：アイテム出現 ---
    if (type === 'bossItemStar') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, now);
      osc.frequency.exponentialRampToValueAtTime(1320, now + 0.06);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.085, now + 0.008);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.11);
      osc.start(now);
      osc.stop(now + 0.12);
      return;
    }
    if (type === 'bossItemHeal') {
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(660, now);
      osc.frequency.exponentialRampToValueAtTime(520, now + 0.05);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.09, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.14);
      osc.start(now);
      osc.stop(now + 0.15);
      const osc2 = audio.ctx.createOscillator();
      const g2 = audio.ctx.createGain();
      osc2.type = 'sine';
      osc2.frequency.setValueAtTime(990, now + 0.06);
      g2.gain.setValueAtTime(0.0001, now + 0.06);
      g2.gain.exponentialRampToValueAtTime(0.055, now + 0.07);
      g2.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);
      osc2.connect(g2);
      g2.connect(audio.seOutput);
      osc2.start(now + 0.06);
      osc2.stop(now + 0.19);
      return;
    }
    // --- ボス戦：攻撃発動（枝：重い破砕＋木のきしみ＋土砂ノイズ） ---
    if (type === 'bossAtkBranch') {
      const wm = bossSefxBk();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(95, now);
      osc.frequency.exponentialRampToValueAtTime(48, now + 0.22);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.12 * wm, now + 0.024);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.27);
      osc.start(now);
      osc.stop(now + 0.28);

      const creak = audio.ctx.createOscillator();
      const gCr = audio.ctx.createGain();
      creak.type = 'triangle';
      creak.frequency.setValueAtTime(175, now + 0.04);
      creak.frequency.exponentialRampToValueAtTime(68, now + 0.19);
      gCr.gain.setValueAtTime(0.0001, now + 0.04);
      gCr.gain.exponentialRampToValueAtTime(0.055 * wm, now + 0.055);
      gCr.gain.exponentialRampToValueAtTime(0.0001, now + 0.21);
      creak.connect(gCr);
      gCr.connect(audio.seOutput);
      creak.start(now + 0.04);
      creak.stop(now + 0.23);

      playLowpassNoiseSweep(audio.ctx, now + 0.02, 0.12, 1700, 85, 0.042 * wm);
      playBandNoiseBurst(audio.ctx, now + 0.07, 0.075, 380, 0.75, 0.028 * wm);
      return;
    }
    // --- ボス戦：被弾（根：打撃＋土埃） ---
    if (type === 'bossHitRoot') {
      const wm = bossSefxBk();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(150, now);
      osc.frequency.exponentialRampToValueAtTime(82, now + 0.11);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.1 * wm, now + 0.012);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.13);
      osc.start(now);
      osc.stop(now + 0.14);

      const bump = audio.ctx.createOscillator();
      const gB = audio.ctx.createGain();
      bump.type = 'sine';
      bump.frequency.setValueAtTime(118, now + 0.006);
      bump.frequency.exponentialRampToValueAtTime(62, now + 0.1);
      gB.gain.setValueAtTime(0.0001, now + 0.006);
      gB.gain.exponentialRampToValueAtTime(0.08 * wm, now + 0.012);
      gB.gain.exponentialRampToValueAtTime(0.0001, now + 0.12);
      bump.connect(gB);
      gB.connect(audio.seOutput);
      bump.start(now + 0.006);
      bump.stop(now + 0.13);

      playLowpassNoiseSweep(audio.ctx, now + 0.01, 0.09, 900, 120, 0.032 * wm);
      return;
    }
  }

  function setupButton(id, key) {
    const btn = document.getElementById(id);
    const on = (e) => {
      e.preventDefault();
      ensureAudioContext();
      input[key] = true;
      if (key === 'jump') input.jumpPressed = true;
      if (key === 'attack') input.attackPressed = true;
    };
    const off = (e) => {
      e.preventDefault();
      input[key] = false;
    };
    btn.addEventListener('touchstart', on, {passive: false});
    btn.addEventListener('touchend',   off, {passive: false});
    btn.addEventListener('touchcancel', off, {passive: false});
    btn.addEventListener('mousedown',  on);
    btn.addEventListener('mouseup',    off);
    btn.addEventListener('mouseleave', off);
  }
  setupButton('btn-left',  'left');
  setupButton('btn-right', 'right');
  setupButton('btn-attack', 'attack');
  setupButton('btn-jump',  'jump');

  // キーボード（PCデバッグ用）
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' || e.key === 'p' || e.key === 'P') {
      if (gameStarted && !gameOverMenuActive) {
        e.preventDefault();
        togglePauseMenu();
      }
      return;
    }
    if (!gameStarted || gamePaused) return;
    if (e.key === 'ArrowLeft')  input.left  = true;
    if (e.key === 'ArrowRight') input.right = true;
    if (e.key === ' ' || e.key === 'ArrowUp') {
      ensureAudioContext();
      if (!input.jump) input.jumpPressed = true;
      input.jump = true;
      e.preventDefault();
    }
    if (e.key === 'x' || e.key === 'X') {
      if (!input.attack) input.attackPressed = true;
      input.attack = true;
    }
  });
  document.addEventListener('keyup', (e) => {
    if (e.key === 'Escape' || e.key === 'p' || e.key === 'P') return;
    if (!gameStarted || gamePaused) return;
    if (e.key === 'ArrowLeft')  input.left  = false;
    if (e.key === 'ArrowRight') input.right = false;
    if (e.key === ' ' || e.key === 'ArrowUp') input.jump = false;
    if (e.key === 'x' || e.key === 'X') input.attack = false;
  });

    gameOverPanelEl.style.display = 'none';

    player.vx = 0; player.vy = 0;
    camX = 0;
    collected = 0;
    gameWon = false;
    clearTimer = 0;

    jumpCount = 0;
    invincibleUntilMs = 0;

      e.x = e.minX;

      e.defeated = false;

    platforms.forEach((p) => {
      p.y = typeof p.baseY === 'number' ? p.baseY : p.y;
      p.disabled = false;

  function updateHud() {
    const heart = '❤️ ' + lives;
    if (playerSkin === 'puni') {
      // プニ：星弾は中央の score ではなく残機横（ボスゲージと被らない）
      if (isBossStage()) {
        scoreEl.textContent = '';
        livesEl.textContent = heart + '  ·  ⭐' + starAmmo;
      } else {
        scoreEl.textContent = '💎 ' + collected + ' / ' + stars.length;
        livesEl.textContent = heart + '  ·  ⭐弾' + starAmmo;
      }
    } else {
      if (isBossStage()) {
        scoreEl.textContent = '';
      } else {
        scoreEl.textContent = '💎 ' + collected + ' / ' + stars.length;
      }
      livesEl.textContent = heart;
    }
    syncAttackButtonVisual();
  }

  /** アタックボタン：しっぽクール中はグレー＋残り秒、プニは星0でグレー */
  function syncAttackButtonVisual() {
    if (!attackBtn) return;
    if (!gameStarted || gameOverMenuActive) {
      attackBtn.classList.remove('attack-cooldown', 'attack-disabled');
      attackBtn.textContent = 'ATTACK';
      return;
    }
    if (gameWon) {
      attackBtn.classList.remove('attack-cooldown', 'attack-disabled');
      attackBtn.textContent = 'ATTACK';
      return;
    }
    const nowMs = performance.now();
    if (playerSkin === 'lunamon') {
      const leftMs = tailAttackCooldownUntilMs - nowMs;
      if (leftMs > 0) {
        attackBtn.classList.add('attack-cooldown');
        attackBtn.classList.remove('attack-disabled');
        const sec = Math.max(0, leftMs / 1000);
        const secLabel = (sec < 10 ? sec.toFixed(1) : sec.toFixed(0)) + 's';
        attackBtn.innerHTML =
          '<span class="atk-line1">ATTACK</span><span class="atk-cd">' +
          secLabel +
          '</span>';
        return;
      }
      attackBtn.classList.remove('attack-cooldown', 'attack-disabled');
      attackBtn.textContent = 'ATTACK';
      return;
    }
    if (starAmmo <= 0) {
      attackBtn.classList.add('attack-disabled');
      attackBtn.classList.remove('attack-cooldown');
      attackBtn.textContent = 'ATTACK';
      return;
    }
    attackBtn.classList.remove('attack-cooldown', 'attack-disabled');
    attackBtn.textContent = 'ATTACK';
  }

  function respawnPlayer(x, y) {
    player.x = typeof x === 'number' ? x : 80;
    player.y = typeof y === 'number' ? y : 200;
    player.vx = 0;
    player.vy = 0;
    player.onGround = false;
    jumpCount = 0;
    camX = isBossStage() ? 0 : Math.max(0, player.x - W / 2);
  }

  function isInvincible() {
    return performance.now() < invincibleUntilMs;
  }

  function onPlayerDamage(stayAtCurrentPosition) {
    lives--;
    updateHud();
    if (lives <= 0) {
      gamePaused = false;
      pausePanelEl.style.display = 'none';
      showMessage('ゲームオーバー');
      gameOverMenuActive = true;
      gameOverPanelEl.style.display = 'flex';
      input.left = input.right = input.jump = input.attack = false;
      input.jumpPressed = input.attackPressed = false;
      stopBossFileBgm();
      syncPauseOpenButtonVisibility();
      syncAttackButtonVisual();
      return;
    }
    if (stayAtCurrentPosition) {
      // 倒れた位置から再開し、短時間の連続被弾を防ぐ
      player.vx = 0;
      player.vy = 0;
      player.onGround = false;
      jumpCount = 0;
      invincibleUntilMs = performance.now() + 1000;
      return;
    }
    respawnPlayer();
  }

  function getHoleRespawnPoint(x) {
    if (!stageHoles || stageHoles.length === 0) {
      return {x: 80, y: 200};
    }
    let targetHole = stageHoles.find((h) => x >= h.x && x <= h.x + h.w);
    if (!targetHole) {
      let bestDist = Infinity;
      for (const h of stageHoles) {
        const center = h.x + h.w * 0.5;
        const dist = Math.abs(x - center);
        if (dist < bestDist) {
          bestDist = dist;
          targetHole = h;
        }
      }
    }
    return {
      x: Math.max(50, targetHole.x - 34),
      y: 400
    };
  }

  function onFallDamage() {
    playSe('fall');
    lives--;
    updateHud();
    if (lives <= 0) {
      gamePaused = false;
      pausePanelEl.style.display = 'none';
      showMessage('ゲームオーバー');
      gameOverMenuActive = true;
      gameOverPanelEl.style.display = 'flex';
      input.left = input.right = input.jump = input.attack = false;
      input.jumpPressed = input.attackPressed = false;
      stopBossFileBgm();
      syncPauseOpenButtonVisibility();
      syncAttackButtonVisual();
      return;
    }
    const point = getHoleRespawnPoint(player.x);
    respawnPlayer(point.x, point.y);
  }

  function isBossStage() {
    return currentStageId === 'stage4';
  }

  // ボス木の描画矩形・複数矩形当たり判定・プレイヤー進入禁止左端
  function getBossArenaLayout() {
    const iw = bossSheetReady ? BOSS_SHEET.naturalWidth : 1024;
    const ih = bossSheetReady ? BOSS_SHEET.naturalHeight : 1024;
    // テクスチャはトリミングせず全幅・全高を使う（drawImage のソース矩形＝自然サイズ）
    const sw = iw;
    const sh = ih;
    // 縦が収まる上限から destW を決め、必要なら縮小して右端が画面内に収まるようにする
    const destWByH = Math.floor((H - 76) * (sw / sh));
    const rightPad = 8;
    const leftPad = 4;
    let destW = Math.min(328, W - 88, destWByH) + 5 + 30;
    let destH = destW * (sh / sw);
    // 右端が画面外に出ないよう幅を抑える（画像を切らない）
    while (destW > 120 && destW > W - leftPad - rightPad) {
      destW -= 2;
      destH = destW * (sh / sw);
    }
    // 上方向に約30px拡大：高さを伸ばし、足元（レイアウト下端）の位置は維持
    const extraUpPx = 30;
    const destHBase = destH;
    const dyBase = 398 - destHBase * 0.82 - 5 - 30;
    const bottomAnchor = dyBase + destHBase;
    destH += extraUpPx;
    destW = destH * (sw / sh);
    while (destW > 120 && destW > W - leftPad - rightPad) {
      destW -= 2;
      destH = destW * (sh / sw);
    }
    const dxPrefer = W - destW + 28 - 5 - 30 - 40;
    const dxMax = W - destW - rightPad;
    let dx = Math.max(leftPad, Math.min(dxPrefer, dxMax));
    let dy = bottomAnchor - destH;
    if (dy + destH > H - rightPad) {
      dy = H - rightPad - destH;
    }
    if (dy < 12) {
      dy = 12;
    }

    // 上に10px拡大（矩形の下端位置を維持）
    const growUpPx = 10;
    const bottomY = dy + destH;
    destH += growUpPx;
    destW = destH * (sw / sh);
    while (destW > 120 && destW > W - leftPad - rightPad) {
      destW -= 2;
      destH = destW * (sh / sw);
    }
    dy = bottomY - destH;
    if (dy + destH > H - rightPad) {
      dy = H - rightPad - destH;
    }
    if (dy < 12) {
      dy = 12;
    }

    // 下に5px拡大（上端 dy はそのまま、下端だけ伸ばす）
    const growDownPx = 5;
    destH += growDownPx;
    destW = destH * (sw / sh);
    while (destW > 120 && destW > W - leftPad - rightPad) {
      destW -= 2;
      destH = destW * (sh / sw);
    }
    if (dy + destH > H - rightPad) {
      dy = H - rightPad - destH;
    }
    if (dy < 12) {
      dy = 12;
    }

    // 基準位置から右へ69px（さらに+15）。右端は画面外へはみ出しても可
    const BOSS_SHIFT_RIGHT_PX = 69;
    dx = Math.max(leftPad, dx + BOSS_SHIFT_RIGHT_PX);

    // 幹・顔・根元の3矩形（描画先矩形に対する比率。透過外枠は含まない）
    const ratioRects = [
      { nx: 0.1, ny: 0.3, nw: 0.32, nh: 0.58 },
      { nx: 0.36, ny: 0.1, nw: 0.44, nh: 0.42 },
      { nx: 0.04, ny: 0.52, nw: 0.2, nh: 0.4 }
    ];
    const hitRects = ratioRects.map((r) => ({
      x: dx + destW * r.nx,
      y: dy + destH * r.ny,
      w: destW * r.nw,
      h: destH * r.nh
    }));

    let minHx = W;
    for (const r of hitRects) {
      minHx = Math.min(minHx, r.x);
    }
    // 幹より手前で止めすぎない。張り付き対策は強風で左へ戻す
    const blockLeft = minHx + 36;

    let ux0 = Infinity;
    let uy0 = Infinity;
    let ux1 = -Infinity;
    let uy1 = -Infinity;
    for (const r of hitRects) {
      ux0 = Math.min(ux0, r.x);
      uy0 = Math.min(uy0, r.y);
      ux1 = Math.max(ux1, r.x + r.w);
      uy1 = Math.max(uy1, r.y + r.h);
    }
    const hitUnion = { x: ux0, y: uy0, w: ux1 - ux0, h: uy1 - uy0 };

    return { dx, dy, destW, destH, sw, sh, hitRects, hitUnion, blockLeft };
  }

  /** 星弾・しっぽ用：いずれかのダメージ矩形に円が当たるか */
  function bossDamageHitCircle(cx, cy, cr) {
    for (const r of getBossArenaLayout().hitRects) {
      if (rectCircleCollide(r, cx, cy, cr)) return true;
    }
    return false;
  }

  /** しっぽ矩形がいずれかのダメージ矩形と重なるか */
  function bossDamageHitRect(box) {
    for (const r of getBossArenaLayout().hitRects) {
      if (rectRectsOverlap(box, r)) return true;
    }
    return false;
  }

  /** HP半分以下で予備動作時間のみ 1.3 倍速（所要時間は 1/1.3） */
  function bossWindupDurationScale() {
    return bossHp <= BOSS_MAX_HP * 0.5 ? 1 / 1.3 : 1;
  }

  /** HP が 5 以下のときの強化フェーズ（葉3ウェーブ計9枚・枝3波・リンゴ5個） */
  function bossIsDesperationPhase() {
    return bossHp <= 5;
  }

  /** 通常時のリンゴ連続落下の間隔（ms） */
  const BOSS_APPLE_SPAWN_INTERVAL_MS = 1000;
  /** 強化時はリンゴ落下間隔をやや短く */
  function bossAppleSpawnIntervalMs() {
    return bossIsDesperationPhase() ? 760 : BOSS_APPLE_SPAWN_INTERVAL_MS;
  }

  /** 葉ウェーブ間のインターバル（ms）：強化時はウェーブ間隔のみ短く（連射間隔は据え置き） */
  function bossLeafWaveGapActiveMs() {
    return bossIsDesperationPhase() ? 150 : BOSS_LEAF_WAVE_GAP_MS;
  }

  function bossAppleSpawnCap() {
    return bossIsDesperationPhase() ? 5 : 3;
  }

  /** 枝攻撃の総ウェーブ数（警告→根突き上げを1ウェーブと数える） */
  function bossBranchWaveCap() {
    return bossIsDesperationPhase() ? 3 : 2;
  }

  /** 葉攻撃のウェーブ数（各ウェーブ3枚） */
  function bossLeafWaveCap() {
    return bossIsDesperationPhase() ? 3 : 2;
  }

  // 回復・星アイテムの出現範囲（左壁より右、ボス幹より左）
  function getBossPickupSpawnBounds() {
    const lay = getBossArenaLayout();
    const minX = 48;
    const maxX = Math.max(minX + 80, lay.blockLeft - 56);
    return { minX, maxX, minY: 250, maxY: 392 };
  }
